<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>القرآن الكريم — Nüzul Zaman Şeridi v2</title>
<link href="https://fonts.googleapis.com/css2?family=Amiri:ital@0;1&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
<style>
:root {
  --gold: #c9a96e;
  --bg: #0b0b1e;
  --glass: rgba(255, 255, 255, 0.08);
  --glass-border: rgba(201, 169, 110, 0.2);
  --blur: 15px;
}

*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:#fff;font-family:'Inter', sans-serif;}

/* Arka Plan Yıldızlar */
canvas#stars{position:absolute;inset:0;pointer-events:none;z-index:0}

#app {
  width: 100%;
  height: 100vh;
  position: relative;
  overflow: hidden;
}

/* Zaman Şeridi (Zemin) */
#world {
  position: absolute;
  top: 0; left: 0;
  transform-origin: 0 0;
  transition: transform 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
  will-change: transform;
}

/* Sade Kart Tasarımı */
.column {
  position: absolute;
  width: 160px;
  height: 240px;
  background: var(--glass);
  border: 1px solid var(--glass-border);
  border-radius: 12px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: transform 0.4s, border-color 0.4s;
  text-align: center;
  padding: 15px;
}
.column:hover {
  transform: scale(1.05) translateY(-10px);
  border-color: var(--gold);
}
.col-title-ar { font-family: 'Amiri', serif; font-size: 24px; color: var(--gold); margin-bottom: 8px; }
.col-title-tr { font-size: 14px; opacity: 0.8; font-weight: 300; }

/* GENİŞLEYEN KART (PORTAL) */
#portal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(0,0,0,0.85);
  backdrop-filter: blur(var(--blur));
  display: none;
  z-index: 100;
  opacity: 0;
  transition: opacity 0.5s ease;
}

#expanded-card {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%) scale(0.9);
  width: 90%; height: 85%;
  max-width: 1200px;
  background-size: cover;
  background-position: center;
  border-radius: 24px;
  overflow: hidden;
  display: flex;
  transition: transform 0.5s cubic-bezier(0.16, 1, 0.3, 1);
  box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
}

/* Sol İçerik Alanı (Glassmorphism) */
.card-main {
  flex: 1;
  padding: 60px;
  display: flex;
  flex-direction: column;
  justify-content: center;
  background: linear-gradient(90deg, rgba(0,0,0,0.7) 0%, rgba(0,0,0,0.2) 100%);
  overflow-y: auto;
}

.ay-text-ar { font-family: 'Amiri', serif; font-size: 48px; line-height: 1.6; color: var(--gold); direction: rtl; margin-bottom: 30px; }
.ay-text-tr { font-size: 20px; line-height: 1.8; font-weight: 300; background: var(--glass); padding: 25px; border-radius: 16px; border: 1px solid var(--glass-border); backdrop-filter: blur(5px); }

/* Sağ Sabit Buton Paneli (Action Bar) */
.action-bar {
  width: 80px;
  background: rgba(0,0,0,0.4);
  backdrop-filter: blur(10px);
  border-left: 1px solid var(--glass-border);
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 20px 0;
  gap: 20px;
}

.action-btn {
  width: 50px; height: 50px;
  border-radius: 12px;
  border: 1px solid var(--glass-border);
  background: var(--glass);
  color: var(--gold);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: 0.3s;
}
.action-btn:hover { background: var(--gold); color: #000; transform: translateY(-3px); }
.action-btn svg { width: 24px; height: 24px; fill: currentColor; }

/* Kapatma Butonu */
.close-portal {
  position: absolute; top: 20px; right: 20px;
  background: none; border: none; color: #fff; font-size: 30px; cursor: pointer; z-index: 101;
}

</style>
</head>
<body>

<div id="app">
  <canvas id="stars"></canvas>
  <div id="world"></div>
</div>

<div id="portal-overlay">
  <button class="close-portal" onclick="closePortal()">×</button>
  <div id="expanded-card">
    <div class="card-main">
      <div id="p-ar" class="ay-text-ar"></div>
      <div id="p-tr" class="ay-text-tr"></div>
    </div>
    <div class="action-bar">
      <div class="action-btn" title="Meal"><svg viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg></div>
      <div class="action-btn" title="Tefsir"><svg viewBox="0 0 24 24"><path d="M21 5c-1.11-.35-2.33-.5-3.5-.5-1.95 0-4.05.4-5.5 1.5-1.45-1.1-3.55-1.5-5.5-1.5S2.45 4.9 1 6v14.65c0 .25.25.5.5.5.1 0 .15-.05.25-.05C3.1 20.45 5.05 20 6.5 20c1.95 0 4.05.4 5.5 1.5 1.35-.85 3.1-1.5 5.5-1.5 1.65 0 3.35.3 4.75 1.05.1.05.15.05.25.05.25 0 .5-.25.5-.5V6c-.6-.45-1.25-.75-2-1zm0 13.5c-1.1-.35-2.3-.5-3.5-.5-1.7 0-3.45.3-5 1V7c1.55-.7 3.3-1 5-1 1.2 0 2.4.15 3.5.5v11z"/></svg></div>
      <div class="action-btn" title="AI Görsel"><svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-1 16H6c-.55 0-1-.45-1-1V6c0-.55.45-1 1-1h12c.55 0 1 .45 1 1v12c0 .55-.45 1-1 1zm-4.44-6.19l-2.35 3.02-1.56-1.88c-.2-.25-.58-.24-.77.03l-1.9 2.71c-.26.37.01.88.46.88h9.12c.46 0 .72-.51.46-.88l-2.69-3.62c-.19-.26-.59-.26-.77-.27z"/></svg></div>
      <div class="action-btn" title="Notlarım"><svg viewBox="0 0 24 24"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg></div>
    </div>
  </div>
</div>

<script>
// MOCK DATA (Gelecekte JSON'dan gelecek)
const NUZUL = [
  { s:96, tr:"Alak", ar:"العلق", sira:1 },
  { s:68, tr:"Kalem", ar:"القلم", sira:2 },
  { s:73, tr:"Müzzemmil", ar:"المزمل", sira:3 }
  // ... Tüm listeyi buraya ekleyebilirsin
];

const COL_W = 200;
let fersah = 5;
let wx = 0, wy = 0;

function init() {
  const world = document.getElementById('world');
  NUZUL.forEach((n, i) => {
    const col = document.createElement('div');
    col.className = 'column';
    col.style.left = (i * COL_W) + 'px';
    col.style.top = '300px';
    col.innerHTML = `<div class="col-title-ar">${n.ar}</div><div class="col-title-tr">${n.tr}</div>`;
    col.onclick = () => openPortal(n);
    world.appendChild(col);
  });
  
  // Başlangıç Odağı: 1. Sureye Zoom Yap
  setTimeout(() => {
    focusOn(0);
  }, 500);
}

function focusOn(index) {
  const world = document.getElementById('world');
  const targetX = -(index * COL_W) + (window.innerWidth / 2 - 80);
  const scale = 1;
  world.style.transform = `translate(${targetX}px, 0px) scale(${scale})`;
}

function openPortal(n) {
  const overlay = document.getElementById('portal-overlay');
  const card = document.getElementById('expanded-card');
  
  // İçerik Doldurma (Örnek)
  document.getElementById('p-ar').innerText = "بِسْمِ اللَّهِ الرَّحْمَنِ الرَّحِيمِ";
  document.getElementById('p-tr').innerText = n.tr + " suresi tefekkür sayfası. Burada meal ve kullanıcının kişisel notları yer alacak.";
  
  // AI Arka Planı (Örnek)
  card.style.backgroundImage = `url('https://images.unsplash.com/photo-1506744038136-46273834b3fb?auto=format&fit=crop&w=1200&q=80')`;
  
  overlay.style.display = 'block';
  setTimeout(() => {
    overlay.style.opacity = '1';
    card.style.transform = 'translate(-50%, -50%) scale(1)';
  }, 10);
}

function closePortal() {
  const overlay = document.getElementById('portal-overlay');
  const card = document.getElementById('expanded-card');
  overlay.style.opacity = '0';
  card.style.transform = 'translate(-50%, -50%) scale(0.9)';
  setTimeout(() => overlay.style.display = 'none', 500);
}

// Yıldız Arka Planı
const canvas = document.getElementById('stars');
const ctx = canvas.getContext('2d');
function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
window.onresize = resize;
resize();

function drawStars() {
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle = "#fff";
  for(let i=0; i<200; i++) {
    ctx.beginPath();
    ctx.arc(Math.random()*canvas.width, Math.random()*canvas.height, Math.random()*1.5, 0, Math.PI*2);
    ctx.fill();
  }
}
drawStars();
init();

</script>
</body>
</html>
