<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>القرآن الكريم — Nüzul Zaman Şeridi v2</title>
<link href="https://fonts.googleapis.com/css2?family=Amiri:ital@0;1&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
<style>
:root {
  --gold: #c9a96e;
  --bg: #0b0b1e;
  --glass: rgba(255, 255, 255, 0.08);
  --glass-border: rgba(201, 169, 110, 0.2);
  --blur: 20px;
}

*{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);color:#fff;font-family:'Inter', sans-serif;}

canvas#stars{position:absolute;inset:0;pointer-events:none;z-index:0}

#app { width: 100%; height: 100vh; position: relative; overflow: hidden; }

/* Zaman Şeridi Konteyneri */
#world {
  position: absolute;
  top: 50%; left: 0;
  transform-origin: 0 50%;
  transition: transform 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
  display: flex;
  align-items: center;
  padding-left: 50vw; /* İlk sure merkezden başlasın */
}

/* Kart Tasarımı */
.column {
  flex: 0 0 180px;
  height: 280px;
  margin-right: 40px;
  background: var(--glass);
  border: 1px solid var(--glass-border);
  border-radius: 16px;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: all 0.4s ease;
  backdrop-filter: blur(5px);
  position: relative;
}
.column:hover {
  transform: translateY(-15px);
  border-color: var(--gold);
  background: rgba(201, 169, 110, 0.1);
}
.col-num { position: absolute; top: 15px; left: 15px; font-size: 12px; color: var(--gold); opacity: 0.6; }
.col-title-ar { font-family: 'Amiri', serif; font-size: 32px; color: var(--gold); margin-bottom: 10px; }
.col-title-tr { font-size: 16px; font-weight: 300; letter-spacing: 1px; }

/* GENİŞLEYEN KART (PORTAL) */
#portal-overlay {
  position: fixed;
  inset: 0;
  background: rgba(5, 5, 15, 0.9);
  backdrop-filter: blur(var(--blur));
  display: none;
  z-index: 1000;
  opacity: 0;
  transition: opacity 0.4s ease;
}

#expanded-card {
  position: absolute;
  top: 50%; left: 50%;
  transform: translate(-50%, -50%) scale(0.95);
  width: 92%; height: 88%;
  max-width: 1300px;
  background-color: #000;
  background-size: cover;
  background-position: center;
  border-radius: 30px;
  display: flex;
  box-shadow: 0 50px 100px rgba(0,0,0,0.8);
  border: 1px solid var(--glass-border);
  overflow: hidden;
}

.card-main {
  flex: 1;
  padding: 80px;
  background: linear-gradient(to right, rgba(0,0,0,0.85) 30%, transparent 100%);
  display: flex;
  flex-direction: column;
  justify-content: center;
  overflow-y: auto;
}

.ay-text-ar { font-family: 'Amiri', serif; font-size: 56px; color: var(--gold); direction: rtl; margin-bottom: 40px; line-height: 1.4; }
.ay-text-tr { 
  font-size: 22px; line-height: 1.8; font-weight: 300; 
  background: rgba(255,255,255,0.05); 
  padding: 35px; border-radius: 20px; 
  border: 1px solid rgba(255,255,255,0.1);
  backdrop-filter: blur(10px);
}

.action-bar {
  width: 90px;
  background: rgba(0,0,0,0.5);
  border-left: 1px solid var(--glass-border);
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 30px 0;
  gap: 25px;
}

.action-btn {
  width: 55px; height: 55px;
  border-radius: 15px;
  background: var(--glass);
  color: var(--gold);
  display: flex; align-items: center; justify-content: center;
  cursor: pointer; transition: 0.3s;
  border: 1px solid transparent;
}
.action-btn:hover { border-color: var(--gold); background: rgba(201,169,110,0.2); transform: scale(1.1); }
.action-btn svg { width: 26px; height: 26px; fill: currentColor; }

.close-btn {
  position: absolute; top: 30px; right: 30px;
  width: 40px; height: 40px; border-radius: 50%;
  background: rgba(255,255,255,0.1); border: none;
  color: #fff; font-size: 24px; cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  z-index: 1001; transition: 0.3s;
}
.close-btn:hover { background: #ff4757; }

</style>
</head>
<body>

<div id="app">
  <canvas id="stars"></canvas>
  <div id="world"></div>
</div>

<div id="portal-overlay">
  <button class="close-btn" onclick="closePortal()">×</button>
  <div id="expanded-card">
    <div class="card-main">
      <div id="p-ar" class="ay-text-ar"></div>
      <div id="p-tr" class="ay-text-tr"></div>
    </div>
    <div class="action-bar">
      <div class="action-btn" title="Meal"><svg viewBox="0 0 24 24"><path d="M12 21.35l-1.45-1.32C5.4 15.36 2 12.28 2 8.5 2 5.42 4.42 3 7.5 3c1.74 0 3.41.81 4.5 2.09C13.09 3.81 14.76 3 16.5 3 19.58 3 22 5.42 22 8.5c0 3.78-3.4 6.86-8.55 11.54L12 21.35z"/></svg></div>
      <div class="action-btn" title="Tefsir"><svg viewBox="0 0 24 24"><path d="M21 5c-1.11-.35-2.33-.5-3.5-.5-1.95 0-4.05.4-5.5 1.5-1.45-1.1-3.55-1.5-5.5-1.5S2.45 4.9 1 6v14.65c0 .25.25.5.5.5.1 0 .15-.05.25-.05C3.1 20.45 5.05 20 6.5 20c1.95 0 4.05.4 5.5 1.5 1.35-.85 3.1-1.5 5.5-1.5 1.65 0 3.35.3 4.75 1.05.1.05.15.05.25.05.25 0 .5-.25.5-.5V6c-.6-.45-1.25-.75-2-1zm0 13.5c-1.1-.35-2.3-.5-3.5-.5-1.7 0-3.45.3-5 1V7c1.55-.7 3.3-1 5-1 1.2 0 2.4.15 3.5.5v11z"/></svg></div>
      <div class="action-btn" title="AI Görsel"><svg viewBox="0 0 24 24"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-1 16H6c-.55 0-1-.45-1-1V6c0-.55.45-1 1-1h12c.55 0 1 .45 1 1v12c0 .55-.45 1-1 1zm-4.44-6.19l-2.35 3.02-1.56-1.88c-.2-.25-.58-.24-.77.03l-1.9 2.71c-.26.37.01.88.46.88h9.12c.46 0 .72-.51.46-.88l-2.69-3.62c-.19-.26-.59-.26-.77-.27z"/></svg></div>
      <div class="action-btn" title="Notlarım"><svg viewBox="0 0 24 24"><path d="M3 17.25V21h3.75L17.81 9.94l-3.75-3.75L3 17.25zM20.71 7.04c.39-.39.39-1.02 0-1.41l-2.34-2.34c-.39-.39-1.02-.39-1.41 0l-1.83 1.83 3.75 3.75 1.83-1.83z"/></svg></div>
    </div>
  </div>
</div>

<script>

const NUZUL = [

:"الحجر",sira:54},{s:6,tr:"En’âm",ar:"الأنعام",sira:55},{s:37,tr:"Sâffât",ar:"الصافات",sira:56},{s:31,tr:"Lokmân",ar:"لقمان",sira:57},{s:34,tr:"Sebe’",ar:"سبأ",sira:58},{s:39,tr:"Zümer",ar:"الزمر",sira:59},{s:40,tr:"Mü’min",ar:"غافر",sira:60},{s:41,tr:"Fussılet",ar:"فصلت",sira:61},{s:42,tr:"Şûrâ",ar:"الشورى",sira:62},{s:43,tr:"Zuhruf",ar:"الزخرف",sira:63},{s:44,tr:"Duhân",ar:"الدخان",sira:64},{s:45,tr:"Câsiye",ar:"الجاثية",sira:65},{s:46,tr:"Ahkâf",ar:"الأحقاف",sira:66},{s:51,tr:"Zâriyât",ar:"الذاريات",sira:67},{s:88,tr:"Gâşiye",ar:"الغاشية",sira:68},{s:18,tr:"Kehf",ar:"الكهf",sira:69},{s:16,tr:"Nahl",ar:"النحل",sira:70},{s:71,tr:"Nûh",ar:"نوح",sira:71},{s:14,tr:"İbrâhîm",ar:"إبراهيم",sira:72},{s:21,tr:"Enbiyâ",ar:"الأنبياء",sira:73},{s:23,tr:"Mü’minûn",ar:"المؤمنون",sira:74},{s:32,tr:"Secde",ar:"السجدة",sira:75},{s:52,tr:"Tûr",ar:"الطور",sira:76},{s:67,tr:"Mülk",ar:"الملك",sira:77},{s:69,tr:"Hâkka",ar:"الحاقة",sira:78},{s:70,tr:"Meâric",ar:"المعارج",sira:79},{s:78,tr:"Nebe’",ar:"النبأ",sira:80},{s:79,tr:"Nâziât",ar:"النازعات",sira:81},{s:82,tr:"İnfitâr",ar:"الانفطار",sira:82},{s:84,tr:"İnşikâk",ar:"الانشقاق",sira:83},{s:30,tr:"Rûm",ar:"الروم",sira:84},{s:29,tr:"Ankebût",ar:"العنكبوت",sira:85},{s:83,tr:"Mutaffifîn",ar:"المطففين",sira:86},{s:2,tr:"Bakara",ar:"البقرة",sira:87},{s:8,tr:"Enfâl",ar:"الأنفال",sira:88},{s:3,tr:"Âl-i İmrân",ar:"آل عمران",sira:89},{s:33,tr:"Ahzâb",ar:"الأحزاب",sira:90},{s:60,tr:"Mümtehine",ar:"الممتحنة",sira:91},{s:4,tr:"Nisâ",ar:"النساء",sira:92},{s:99,tr:"Zilzâl",ar:"الزلزلة",sira:93},{s:57,tr:"Hadîd",ar:"الحديد",sira:94},{s:47,tr:"Muhammed",ar:"محمد",sira:95},{s:13,tr:"Ra’d",ar:"الرعد",sira:96},{s:55,tr:"Rahmân",ar:"الرحمن",sira:97},{s:76,tr:"İnsan",ar:"الإنسان",sira:98},{s:65,tr:"Talâk",ar:"الطلاق",sira:99},{s:98,tr:"Beyyine",ar:"البينة",sira:100},{s:59,tr:"Haşr",ar:"الحشر",sira:101},{s:24,tr:"Nûr",ar:"النور",sira:102},{s:22,tr:"Hac",ar:"الحج",sira:103},{s:63,tr:"Münâfikûn",ar:"المنافقون",sira:104},{s:58,tr:"Mücâdele",ar:"المجادلة",sira:105},{s:49,tr:"Hucurât",ar:"الحجرات",sira:106},{s:66,tr:"Tahrîm",ar:"التحريم",sira:107},{s:64,tr:"Tegâbun",ar:"التغابن",sira:108},{s:61,tr:"Saff",ar:"الصف",sira:109},{s:62,tr:"Cuma",ar:"الجمعة",sira:110},{s:48,tr:"Fetih",ar:"الفتح",sira:111},{s:5,tr:"Mâide",ar:"المائدة",sira:112},{s:9,tr:"Tevbe",ar:"التوبة",sira:113},{s:110,tr:"Nasr",ar:"النصر",sira:114}
];

function init() {
  const world = document.getElementById('world');
  NUZUL.forEach((n, i) => {
    const col = document.createElement('div');
    col.className = 'column';
    col.innerHTML = `
      <div class="col-num">${n.sira}</div>
      <div class="col-title-ar">${n.ar}</div>
      <div class="col-title-tr">${n.tr}</div>
    `;
    col.onclick = () => openPortal(n, i);
    world.appendChild(col);
  });
  
  // İlk girişte Bakara Suresine (sira 87) odaklan veya en başa git
  setTimeout(() => focusOn(0), 100);
}

function focusOn(index) {
  const world = document.getElementById('world');
  const cardWidth = 220; // 180px + 40px margin
  const targetX = -(index * cardWidth);
  world.style.transform = `translateX(${targetX}px)`;
}

function openPortal(n, index) {
  const overlay = document.getElementById('portal-overlay');
  const card = document.getElementById('expanded-card');
  
  document.getElementById('p-ar').innerText = "بِسْمِ اللَّهِ الرَّحْمَنِ الرَّحِيمِ";
  document.getElementById('p-tr').innerText = n.tr + " Suresi (" + n.s + ". Sure)\n\nNüzul sırasına göre " + n.sira + ". sırada inmiştir. Bu alanda mealler, tefsirler ve senin kişisel notların yer alacak.";
  
  // Örnek bir AI Arka planı (Sureye göre değişebilir)
  card.style.backgroundImage = `url('https://images.unsplash.com/photo-1519817650390-64a93db51149?q=80&w=2000&auto=format&fit=crop')`;
  
  overlay.style.display = 'block';
  setTimeout(() => {
    overlay.style.opacity = '1';
    card.style.transform = 'translate(-50%, -50%) scale(1)';
  }, 10);
}

function closePortal() {
  const overlay = document.getElementById('portal-overlay');
  const card = document.getElementById('expanded-card');
  overlay.style.opacity = '0';
  card.style.transform = 'translate(-50%, -50%) scale(0.95)';
  setTimeout(() => overlay.style.display = 'none', 400);
}

// Yıldız Arka Planı Animasyonu
const canvas = document.getElementById('stars');
const ctx = canvas.getContext('2d');
let stars = [];

function createStars() {
  stars = [];
  for(let i=0; i<400; i++) {
    stars.push({
      x: Math.random() * canvas.width,
      y: Math.random() * canvas.height,
      size: Math.random() * 1.5,
      speed: Math.random() * 0.5
    });
  }
}

function animateStars() {
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle = "rgba(255, 255, 255, 0.8)";
  stars.forEach(s => {
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.size, 0, Math.PI*2);
    ctx.fill();
    s.x -= s.speed;
    if(s.x < 0) s.x = canvas.width;
  });
  requestAnimationFrame(animateStars);
}

window.onresize = () => {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
  createStars();
};

window.onresize();
animateStars();
init();

</script>
</body>
</html>
