<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>القرآن الكريم — Nüzul Zaman Şeridi</title>
<link href="https://fonts.googleapis.com/css2?family=Amiri:ital@0;1&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════════════════
   RESET & TEMEL
═══════════════════════════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #090918; }
body { font-family: system-ui, -apple-system, sans-serif; color: #e8e0d0; }

/* ═══════════════════════════════════════════════════════════
   DEĞİŞKENLER
═══════════════════════════════════════════════════════════ */
:root {
  --altin: #c9a96e;
  --altin-soluk: rgba(201,169,110,.35);
  --altin-cok-soluk: rgba(201,169,110,.12);
  --yesil: rgba(80,190,140,.7);
  --bg: #090918;
  --bg2: rgba(14,14,38,.96);
  --kart-bg: linear-gradient(160deg, rgba(36,32,68,.97), rgba(22,18,52,.97));
  --yb-h: 240px;
  --col-w: 72px;
}

/* ═══════════════════════════════════════════════════════════
   YILDIZ CANVAS
═══════════════════════════════════════════════════════════ */
#stars { position: fixed; inset: 0; pointer-events: none; z-index: 0; }

/* ═══════════════════════════════════════════════════════════
   TOPBAR
═══════════════════════════════════════════════════════════ */
#topbar {
  position: fixed; top: 0; left: 0; right: 0; height: 52px;
  background: var(--bg2);
  border-bottom: .5px solid var(--altin-soluk);
  display: flex; align-items: center; gap: 10px;
  padding: 0 14px; z-index: 100;
}
.brand { flex-shrink: 0; }
.brand-ar { font-family: 'Amiri', serif; font-size: 18px; color: var(--altin); direction: rtl; line-height: 1; }
.brand-sub { font-size: 8px; color: rgba(201,169,110,.4); letter-spacing: 2px; margin-top: 1px; }

/* Arama */
#srch-wrap { position: relative; flex: 1; max-width: 280px; }
#srch {
  width: 100%; background: var(--altin-cok-soluk);
  border: .5px solid var(--altin-soluk); border-radius: 20px;
  color: #e8e0d0; padding: 6px 12px 6px 30px; font-size: 11px; outline: none;
}
#srch::placeholder { color: rgba(201,169,110,.3); }
.srch-icon { position: absolute; left: 9px; top: 50%; transform: translateY(-50%); pointer-events: none; opacity: .45; }
#sr-sonuc {
  position: absolute; top: 34px; left: 0; right: 0; min-width: 320px;
  background: rgba(8,8,26,.98); border: .5px solid var(--altin-soluk);
  border-radius: 8px; max-height: 300px; overflow-y: auto;
  display: none; z-index: 200; box-shadow: 0 8px 28px rgba(0,0,0,.7);
}
#sr-sonuc.acik { display: block; }
#sr-sonuc::-webkit-scrollbar { width: 3px; }
#sr-sonuc::-webkit-scrollbar-thumb { background: var(--altin-soluk); }
.sr-item {
  padding: 7px 11px; border-bottom: .5px solid rgba(201,169,110,.07);
  cursor: pointer; display: grid; grid-template-columns: 100px 1fr; gap: 7px;
}
.sr-item:hover { background: var(--altin-cok-soluk); }
.sr-meta { font-size: 9px; color: rgba(201,169,110,.6); line-height: 1.5; }
.sr-text { font-size: 10.5px; color: rgba(220,210,190,.78); line-height: 1.5; }
.sr-hl { color: var(--altin); background: var(--altin-cok-soluk); border-radius: 2px; padding: 0 2px; }
.sr-bos { padding: 10px; text-align: center; color: rgba(201,169,110,.38); font-size: 10.5px; }

/* Sure & Ayet dropdown menüler */
.dd-wrap { position: relative; }
.dd-btn {
  background: var(--altin-cok-soluk); border: .5px solid var(--altin-soluk);
  border-radius: 16px; color: var(--altin); padding: 5px 12px; font-size: 10px;
  cursor: pointer; white-space: nowrap; display: flex; align-items: center; gap: 5px;
}
.dd-btn:hover { background: rgba(201,169,110,.2); }
.dd-btn svg { transition: transform .2s; }
.dd-btn.acik svg { transform: rotate(180deg); }
.dd-liste {
  position: absolute; top: 32px; right: 0; min-width: 200px; max-height: 280px;
  background: rgba(8,8,26,.98); border: .5px solid var(--altin-soluk);
  border-radius: 8px; overflow-y: auto; display: none; z-index: 200;
  box-shadow: 0 8px 28px rgba(0,0,0,.7);
}
.dd-liste.acik { display: block; }
.dd-liste::-webkit-scrollbar { width: 3px; }
.dd-liste::-webkit-scrollbar-thumb { background: var(--altin-soluk); }
.dd-item {
  padding: 7px 12px; font-size: 10.5px; color: rgba(220,210,190,.8);
  cursor: pointer; border-bottom: .5px solid rgba(201,169,110,.06);
  display: flex; align-items: center; justify-content: space-between;
}
.dd-item:hover { background: var(--altin-cok-soluk); color: var(--altin); }
.dd-item-no { font-size: 9px; color: rgba(201,169,110,.4); }

/* Sıra butonları */
.sira-btn {
  background: rgba(255,255,255,.04); border: .5px solid rgba(255,255,255,.15);
  border-radius: 16px; color: rgba(255,255,255,.45); padding: 5px 12px; font-size: 10px;
  cursor: pointer; white-space: nowrap; transition: all .2s;
}
.sira-btn:hover { background: var(--altin-cok-soluk); border-color: var(--altin-soluk); color: var(--altin); }
.sira-btn.aktif { background: rgba(201,169,110,.15); border-color: rgba(201,169,110,.6); color: var(--altin); }

/* Tümünü göster */
#btn-fit {
  background: var(--altin-cok-soluk); border: .5px solid var(--altin-soluk);
  border-radius: 16px; color: var(--altin); padding: 5px 12px; font-size: 10px;
  cursor: pointer; white-space: nowrap; transition: background .15s; flex-shrink: 0;
}
#btn-fit:hover { background: rgba(201,169,110,.22); }

/* Fersah göstergesi */
#fersah-ind {
  position: fixed; top: 60px; right: 14px;
  font-size: 9px; color: rgba(201,169,110,.38); letter-spacing: 1px;
  z-index: 10; pointer-events: none;
}

/* ═══════════════════════════════════════════════════════════
   VIEWPORT & WORLD
═══════════════════════════════════════════════════════════ */
#vp {
  position: fixed; inset: 0; top: 52px;
  overflow: hidden; cursor: grab; z-index: 1;
}
#vp:active { cursor: grabbing; }
#world {
  position: absolute; top: 0; left: 0;
  transform-origin: left top;
  user-select: none; -webkit-user-select: none;
}

/* ═══════════════════════════════════════════════════════════
   YIL BANDI
═══════════════════════════════════════════════════════════ */
#yil-bandi {
  position: absolute; top: 0; left: 0;
  height: var(--yb-h);
  display: flex; flex-direction: row-reverse; /* RTL: 610 sağda */
  transform-origin: left top;
}
.yb-seg {
  flex-shrink: 0;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  border-right: 1px solid rgba(201,169,110,.12);
  cursor: pointer; overflow: hidden; gap: 4px;
  transition: filter .2s;
}
.yb-seg:hover { filter: brightness(1.35); }
.yb-mekke { background: linear-gradient(to bottom, rgba(201,169,110,.02), rgba(201,169,110,.09)); }
.yb-hicr { background: linear-gradient(to bottom, rgba(255,210,80,.04), rgba(255,210,80,.18)); border-color: rgba(255,210,80,.4); }
.yb-medine { background: linear-gradient(to bottom, rgba(80,190,140,.02), rgba(80,190,140,.09)); }
.yb-yil {
  font-size: 28px; font-weight: 800; line-height: 1;
  /* Zoom'dan bağımsız: JS ile scale kompanse edilecek */
  transform-origin: center center;
}
.yb-mekke .yb-yil { color: rgba(201,169,110,.82); }
.yb-hicr .yb-yil { color: rgba(255,215,90,.95); }
.yb-medine .yb-yil { color: rgba(80,190,140,.82); }
.yb-nub { font-size: 26px; font-weight: 600; line-height: 1.4; transform-origin: center center; }
.yb-hicri { font-size: 26px; font-weight: 600; line-height: 1.4; transform-origin: center center; }
.yb-miladi { font-size: 24px; opacity: .75; line-height: 1.4; transform-origin: center center; }
.yb-mekke .yb-nub, .yb-mekke .yb-hicri, .yb-mekke .yb-miladi { color: rgba(201,169,110,.75); }
.yb-hicr .yb-nub, .yb-hicr .yb-hicri, .yb-hicr .yb-miladi { color: rgba(255,215,90,.9); }
.yb-medine .yb-nub, .yb-medine .yb-hicri, .yb-medine .yb-miladi { color: rgba(80,190,140,.75); }

/* ═══════════════════════════════════════════════════════════
   SURE SÜTUNLARI
═══════════════════════════════════════════════════════════ */
.nc {
  position: absolute;
  display: flex; flex-direction: column; align-items: center;
  width: var(--col-w);
}

/* Sure kartı wrap — 3D salınım buraya uygulanır */
.nh-wrap {
  width: 64px; position: relative;
  transform-style: preserve-3d;
}

/* Sure kartı */
.nh {
  width: 64px;
  background: var(--kart-bg);
  border: .5px solid rgba(201,169,110,.36);
  border-radius: 6px; overflow: hidden;
  position: relative; z-index: 2;
  /* 3D kenar hissi */
  box-shadow: 3px 3px 0 rgba(0,0,0,.4), 6px 6px 0 rgba(0,0,0,.2);
}
.nh.mekki { border-left: 2px solid rgba(201,169,110,.6); }
.nh.medeni { border-left: 2px solid rgba(80,190,140,.6); }

/* Sure kartı üst bölge — zoom/bilgi */
.nh-ust {
  padding: 5px 3px 3px; text-align: center; cursor: pointer;
  transition: background .15s;
}
.nh-ust:hover { background: rgba(201,169,110,.08); }

/* Sure kartı alt bölge — ayet aç */
.nh-alt {
  padding: 2px 3px 4px; text-align: center;
  border-top: .5px solid rgba(201,169,110,.15);
  cursor: pointer; transition: background .15s;
  display: flex; align-items: center; justify-content: center; gap: 3px;
}
.nh-alt:hover { background: rgba(80,190,140,.08); }
.nh-alt-ok {
  width: 14px; height: 14px; display: flex; align-items: center; justify-content: center;
  border: .5px solid rgba(80,190,140,.4); border-radius: 50%;
  color: rgba(80,190,140,.7); font-size: 8px; flex-shrink: 0;
  transition: transform .2s, border-color .2s;
}
.nh-alt:hover .nh-alt-ok { border-color: rgba(80,190,140,.8); }
.nh-alt.acik .nh-alt-ok { transform: rotate(180deg); border-color: rgba(80,190,140,.8); }

.nh-n { font-size: 7px; color: rgba(201,169,110,.5); letter-spacing: .3px; }
.nh-ar { font-size: 12px; color: #d4b47a; font-family: 'Amiri', serif; direction: rtl; line-height: 1.35; margin: 2px 0 1px; }
.nh-tr { font-size: 7px; color: rgba(220,215,200,.7); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 60px; }
.nh-ay { font-size: 6.5px; color: rgba(201,169,110,.3); }
.nih { display: flex; justify-content: center; gap: 2px; }

/* ═══════════════════════════════════════════════════════════
   AYET KARTLARI
═══════════════════════════════════════════════════════════ */
.ap {
  width: 56px; min-height: 28px;
  background: rgba(255,255,255,.05);
  border: .5px solid rgba(255,255,255,.1);
  border-radius: 4px; margin-top: 3px;
  display: none; /* başlangıçta gizli */
  flex-direction: column; align-items: center; justify-content: center;
  cursor: pointer; padding: 3px 2px;
  transform-style: preserve-3d;
  position: relative;
  /* 3D kenar */
  box-shadow: 2px 2px 0 rgba(0,0,0,.35), 4px 4px 0 rgba(0,0,0,.15);
  transition: box-shadow .15s;
}
.ap:hover {
  transform: scale(1.33) !important;
  background: rgba(201,169,110,.14);
  border-color: rgba(201,169,110,.4);
  z-index: 10;
  box-shadow: 4px 4px 0 rgba(0,0,0,.4), 8px 8px 0 rgba(0,0,0,.2);
}
.ap.mk { border-left: 1.5px solid rgba(201,169,110,.5); }
.ap.md { border-left: 1.5px solid rgba(80,190,140,.5); }
.ap-n { font-size: 7.5px; color: rgba(201,169,110,.5); }
.ap-ar {
  font-size: 8px; color: rgba(230,220,200,.5);
  font-family: 'Amiri', serif; direction: rtl; text-align: center;
  line-height: 1.25; overflow: hidden;
  display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical;
}

/* ═══════════════════════════════════════════════════════════
   CONTEXT MENU
═══════════════════════════════════════════════════════════ */
#ctx-menu {
  position: fixed; z-index: 500;
  background: rgba(8,8,26,.97); border: .5px solid var(--altin-soluk);
  border-radius: 8px; padding: 4px; min-width: 140px;
  box-shadow: 0 8px 24px rgba(0,0,0,.6); display: none;
}
#ctx-menu.acik { display: block; }
.ctx-item {
  padding: 7px 12px; font-size: 11px; color: rgba(220,210,190,.8);
  cursor: pointer; border-radius: 5px; display: flex; align-items: center; gap: 8px;
}
.ctx-item:hover { background: var(--altin-cok-soluk); color: var(--altin); }

/* ═══════════════════════════════════════════════════════════
   MODAL (AYET FLIP)
═══════════════════════════════════════════════════════════ */
#modal-bg {
  position: fixed; inset: 52px 0 0;
  background: rgba(4,4,18,.88); z-index: 50;
  display: none; align-items: center; justify-content: center;
  backdrop-filter: blur(6px);
}
#modal-bg.acik { display: flex; }
#modal {
  width: 320px; height: 520px; max-width: 92vw;
  position: relative;
  transform-style: preserve-3d;
  transition: transform .7s cubic-bezier(.4,0,.2,1);
  cursor: pointer;
}
#modal.flip { transform: rotateY(180deg); }
.modal-yuz {
  position: absolute; inset: 0;
  backface-visibility: hidden;
  border-radius: 14px; overflow: hidden;
  display: flex; flex-direction: column;
}
/* Ön yüz */
#modal-on {
  background: linear-gradient(145deg, #0e0e2c, #181838);
  border: .5px solid rgba(201,169,110,.28);
  padding: 20px;
}
/* Arka yüz */
#modal-arka {
  background: linear-gradient(145deg, #0a1d16, #10251e);
  border: .5px solid rgba(100,180,160,.28);
  transform: rotateY(180deg);
  padding: 20px;
}
.modal-kapat {
  position: absolute; top: 10px; right: 12px;
  background: none; border: none; color: rgba(255,255,255,.3);
  font-size: 16px; cursor: pointer; z-index: 5; line-height: 1;
}
.modal-kapat:hover { color: rgba(255,255,255,.75); }
.mbdg {
  display: inline-flex; align-items: center; gap: 5px;
  background: rgba(201,169,110,.1); border: .5px solid rgba(201,169,110,.2);
  border-radius: 20px; padding: 3px 10px; font-size: 10px; color: var(--altin);
  margin-bottom: 8px; width: fit-content;
}
.mds { display: flex; gap: 4px; margin-bottom: 10px; flex-shrink: 0; flex-wrap: wrap; }
.dsb { font-size: 8px; padding: 2px 7px; border-radius: 3px; }
.ds1 { background: rgba(201,169,110,.12); color: rgba(201,169,110,.8); }
.ds2 { background: rgba(100,180,160,.12); color: rgba(100,180,160,.8); }
.ds3 { background: rgba(140,140,210,.12); color: rgba(140,140,210,.8); }
.mar {
  font-family: 'Amiri', serif; font-size: 20px; line-height: 1.9;
  direction: rtl; text-align: right; color: #f0e8d8;
  border-bottom: .5px solid rgba(255,255,255,.07);
  padding-bottom: 10px; margin-bottom: 10px; flex-shrink: 0;
}
.mml { font-size: 13px; line-height: 1.8; color: rgba(220,210,195,.88); flex: 1; overflow-y: auto; }
.mml::-webkit-scrollbar { width: 2px; }
.mml::-webkit-scrollbar-thumb { background: rgba(201,169,110,.3); }
.modal-flip-ipucu {
  font-size: 9px; color: rgba(201,169,110,.3); text-align: center;
  margin-top: 8px; flex-shrink: 0; letter-spacing: 1px;
}
/* Arka yüz — tefsir */
.tef-baslik { font-size: 12px; color: rgba(100,180,160,.9); font-weight: 600; margin-bottom: 6px; flex-shrink: 0; }
.tef-kaynak {
  font-size: 9px; color: rgba(100,180,160,.45);
  background: rgba(100,180,160,.05); border: .5px solid rgba(100,180,160,.1);
  border-radius: 4px; padding: 3px 8px; margin-bottom: 8px; flex-shrink: 0;
}
.tef-metin { font-size: 11.5px; line-height: 1.85; color: rgba(210,230,225,.85); flex: 1; overflow-y: auto; white-space: pre-wrap; }
.tef-metin::-webkit-scrollbar { width: 2px; }
.tef-metin::-webkit-scrollbar-thumb { background: rgba(100,180,160,.3); }
.tef-sayfa {
  display: flex; align-items: center; justify-content: space-between;
  margin-top: 8px; padding-top: 6px; border-top: .5px solid rgba(100,180,160,.12);
  flex-shrink: 0;
}
.tef-btn {
  background: rgba(100,180,160,.08); border: .5px solid rgba(100,180,160,.25);
  color: rgba(100,180,160,.8); padding: 4px 10px; border-radius: 5px; font-size: 10px; cursor: pointer;
}
.tef-btn:disabled { opacity: .3; cursor: not-allowed; }
.tef-no { font-size: 9px; color: rgba(100,180,160,.5); }

/* ═══════════════════════════════════════════════════════════
   YÜKLEME EKRANI
═══════════════════════════════════════════════════════════ */
#yukleniyor {
  position: fixed; inset: 0;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  background: var(--bg); z-index: 999; gap: 14px;
}
.y-ar { font-family: 'Amiri', serif; font-size: 24px; color: var(--altin); }
.y-txt { font-size: 10px; color: rgba(201,169,110,.32); letter-spacing: 3px; margin-top: 4px; }
.y-dots { display: flex; gap: 8px; }
.y-dots span {
  width: 7px; height: 7px; border-radius: 50%; background: var(--altin);
  animation: ydot 1.2s infinite;
}
.y-dots span:nth-child(2) { animation-delay: .2s; }
.y-dots span:nth-child(3) { animation-delay: .4s; }
@keyframes ayetGelAnim {
  from { opacity: 0; transform: scale(.7); }
  to { opacity: 1; transform: scale(1); }
}
@keyframes ydot { 0%,80%,100% { opacity: .2; transform: scale(.8); } 40% { opacity: 1; transform: scale(1); } }

/* ═══════════════════════════════════════════════════════════
   LEGEND & HINT
═══════════════════════════════════════════════════════════ */
#legend {
  position: fixed; bottom: 28px; right: 14px; z-index: 10;
  display: flex; flex-direction: column; gap: 4px;
}
.leg-item { display: flex; align-items: center; gap: 5px; font-size: 9px; color: rgba(201,169,110,.5); }
.leg-dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
#hint-txt {
  position: fixed; bottom: 8px; left: 50%; transform: translateX(-50%);
  font-size: 8px; color: rgba(201,169,110,.2); letter-spacing: 1px;
  pointer-events: none; white-space: nowrap; z-index: 10;
}
</style>
</head>
<body>

<canvas id="stars"></canvas>

<!-- TOPBAR -->
<div id="topbar">
  <div class="brand">
    <div class="brand-ar">القرآن الكريم</div>
    <div class="brand-sub">NÜZUL ZAMAN ŞERİDİ · MEFÂTÎHU'L-GAYB</div>
  </div>

  <!-- Arama -->
  <div id="srch-wrap">
    <svg class="srch-icon" width="13" height="13" viewBox="0 0 16 16" fill="none">
      <circle cx="6.5" cy="6.5" r="4.5" stroke="#c9a96e" stroke-width="1.3"/>
      <path d="M10 10l3 3" stroke="#c9a96e" stroke-width="1.3" stroke-linecap="round"/>
    </svg>
    <input id="srch" type="text" placeholder="Ayet, sure veya meal ara..." autocomplete="off">
    <div id="sr-sonuc"></div>
  </div>

  <!-- Sure dropdown -->
  <div class="dd-wrap">
    <button class="dd-btn" id="sure-dd-btn" onclick="ddToggle('sure')">
      Sure
      <svg width="10" height="10" viewBox="0 0 10 10"><path d="M2 3l3 4 3-4" stroke="currentColor" stroke-width="1.2" fill="none" stroke-linecap="round"/></svg>
    </button>
    <div class="dd-liste" id="sure-dd"></div>
  </div>

  <!-- Ayet dropdown -->
  <div class="dd-wrap">
    <button class="dd-btn" id="ayet-dd-btn" onclick="ddToggle('ayet')">
      Ayet
      <svg width="10" height="10" viewBox="0 0 10 10"><path d="M2 3l3 4 3-4" stroke="currentColor" stroke-width="1.2" fill="none" stroke-linecap="round"/></svg>
    </button>
    <div class="dd-liste" id="ayet-dd"></div>
  </div>

  <!-- Sıra butonları -->
  <button class="sira-btn aktif" id="btn-nuzul" onclick="siraDegis('nuzul')">Nüzul Sırası</button>
  <button class="sira-btn" id="btn-mushaf" onclick="siraDegis('mushaf')">Mushaf Sırası</button>
  <button id="btn-fit" onclick="fitAll()">⊞ Tümünü Göster</button>
</div>

<div id="fersah-ind">13. FERSAH</div>

<!-- VIEWPORT -->
<div id="vp">
  <div id="world">
    <div id="yil-bandi"></div>
    <!-- Sütunlar JS ile oluşturulur -->
  </div>
</div>

<!-- LEGEND & HINT -->
<div id="legend">
  <div class="leg-item"><div class="leg-dot" style="background:rgba(201,169,110,.72)"></div>Mekki</div>

function ayetDizi(str) {
  if (!str) return [];
  const p = str.split('-').map(s => parseInt(s));
  if (isNaN(p[0])) return [];
  if (p.length === 1) return [p[0]];
  const a = [];
  for (let i = p[0]; i <= p[1] && a.length < 50; i++) a.push(i);
  return a;
}

function tarihler(sira) {
  const nubYil = Math.min(13, Math.ceil(sira / 14));
  const nub = `Nübüvvet ${nubYil}. Yıl`;
  const hicretOnce = sira <= 86 ? Math.round((86 - sira) / 86 * 13) + 1 : 0;
  const hicri = sira <= 86
    ? `Hicret Öncesi ${hicretOnce}. Yıl`
    : `H. ${Math.ceil((sira - 86) / 16) + 1}. Yıl`;
  const miladi = sira <= 1 ? 'M.S. ~610'
    : sira <= 86 ? `M.S. ~${610 + Math.floor(sira / 9)}`
    : `M.S. ~${622 + Math.ceil((sira - 86) / 16)}`;
  return [nub, hicri, miladi];
}

function vpBoy() {
  const vp = document.getElementById('vp');
  return { w: vp.clientWidth, h: vp.clientHeight };
}

// ═══════════════════════════════════════════════════════════
// ZOOM SİSTEMİ
// ═══════════════════════════════════════════════════════════
function fersahToScale(f) {
  return fitScale * Math.pow(ZOOM_CARPAN, FERSAH_SAYISI - f);
}

function applyT() {
  const world = document.getElementById('world');
  world.style.transform = `translate(${tx}px, ${ty}px) scale(${scale})`;

  // Fersah güncelle
  const mevcut = Math.round(FERSAH_SAYISI - Math.log(scale / fitScale) / Math.log(ZOOM_CARPAN));
  fersah = Math.max(1, Math.min(FERSAH_SAYISI, mevcut));
  document.getElementById('fersah-ind').textContent = fersah + '. FERSAH';

  // Yıl bandı: world'den bağımsız, sadece yatay tx ile senkronize
  const yb = document.getElementById('yil-bandi');
  if (yb) {
    yb.style.transform = `translateX(${tx + (N_COLS * COL_W - 1) * scale * 0}px) scaleX(${scale})`;
  }

  // Sınır kontrolü — kartlar tamamen dışarı çıkmasın
  sinirlariUygula();
}

function sinirlariUygula() {
  const { w, h } = vpBoy();
  const N = NUZUL.length;
  if (!N) return;
  const totalW = N * COL_W * scale;
  const totalH = (YB_H + 300) * scale; // yaklaşık yükseklik

  // En az ekranın %20'si görünür kalsın
  const minGor = 0.2;
  tx = Math.min(tx, w * (1 - minGor));
  tx = Math.max(tx, w * minGor - totalW);
  ty = Math.min(ty, h * 0.5);
  ty = Math.max(ty, h * minGor - totalH);
}

function animateTo(tTx, tTy, tScale, dur, cb) {
  if (animKare) cancelAnimationFrame(animKare);
  const s0 = scale, tx0 = tx, ty0 = ty, t0 = performance.now();
  function step(t) {
    const p = Math.min(1, (t - t0) / dur);
    const e = 1 - Math.pow(1 - p, 3); // ease out cubic
    scale = s0 + (tScale - s0) * e;
    tx = tx0 + (tTx - tx0) * e;
    ty = ty0 + (tTy - ty0) * e;
    applyT();
    if (p < 1) animKare = requestAnimationFrame(step);
    else { scale = tScale; tx = tTx; ty = tTy; applyT(); if (cb) cb(); }
  }
  animKare = requestAnimationFrame(step);
}

function fitAll() {
  const N = NUZUL.length; if (!N) return;
  const { w, h } = vpBoy();
  fitScale = (w * 0.94) / (N * COL_W);
  const tScale = fitScale;
  const tTx = (w - N * COL_W * tScale) / 2;
  const tTy = h * 0.1;
  animateTo(tTx, tTy, tScale, 700);
}

function zoomPivot(yeniFersah, pivX, pivY, dur) {
  yeniFersah = Math.max(1, Math.min(FERSAH_SAYISI, yeniFersah));
  const yeniScale = fersahToScale(yeniFersah);
  const wx = (pivX - tx) / scale;
  const wy = (pivY - ty) / scale;
  const tTx = pivX - wx * yeniScale;
  const tTy = pivY - wy * yeniScale;
  animateTo(tTx, tTy, yeniScale, dur || 300);
}

function ortalaCol(colX, hedefFersah, dur) {
  const { w, h } = vpBoy();
  hedefFersah = Math.max(1, Math.min(FERSAH_SAYISI, hedefFersah));
  const hScale = fersahToScale(hedefFersah);
  const cx = colX + COL_W / 2;
  const tTx = w / 2 - cx * hScale;
  const tTy = Math.max(h * 0.08, ty);
  animateTo(tTx, tTy, hScale, dur || 600);
}

// ═══════════════════════════════════════════════════════════
function buildYilBandi(N) {
  const yb = document.getElementById('yil-bandi');
  yb.innerHTML = '';
  yb.style.width = (N * COL_W) + 'px';
  yb.style.height = YB_H + 'px';

  const YILLAR = 22; // 610-631
  const colsPerYil = N / YILLAR;

  for (let y = 0; y < YILLAR; y++) {
    const yr = 610 + y;
    const cols = y === YILLAR - 1
      ? N - Math.round(colsPerYil) * (YILLAR - 1)
      : Math.round(colsPerYil);

    const seg = document.createElement('div');
    seg.className = 'yb-seg ' + (yr === 622 ? 'yb-hicr' : yr < 622 ? 'yb-mekke' : 'yb-medine');
    seg.style.width = (cols * COL_W) + 'px';
    seg.style.height = YB_H + 'px';

    // Tıklayınca o döneme git
    const startColIdx = Math.round(colsPerYil * y);
    const colX = (N - 1 - startColIdx) * COL_W;
    seg.addEventListener('click', () => ortalaCol(colX, 5, 700));

    // 3 satır tarih
    const nubYil = yr <= 622 ? (yr - 610 + 1) : null;
    const nubTxt = nubYil ? `Nübüvvet ${nubYil}. Yıl` : 'Nübüvvet Sonrası';
    const hicriTxt = yr === 622 ? 'Hicret Yılı'
      : yr < 622 ? `Hicret Öncesi ${622 - yr}. Yıl`
      : `Hicret Sonrası ${yr - 622}. Yıl`;
    const miladiTxt = yr === 622 ? '✦ M.S. 622 — HİCRET' : yr === 610 ? '▶ M.S. 610 — İLK VAHİY' : `M.S. ${yr}`;

    const nubEl = document.createElement('div');
    nubEl.className = 'yb-nub';
    nubEl.textContent = nubTxt;

    const hicriEl = document.createElement('div');
    hicriEl.className = 'yb-hicri';
    hicriEl.textContent = hicriTxt;

    const miladiEl = document.createElement('div');
    miladiEl.className = 'yb-miladi';
    miladiEl.textContent = miladiTxt;

    seg.appendChild(nubEl);
    seg.appendChild(hicriEl);
    seg.appendChild(miladiEl);
    yb.appendChild(seg);
  }
}

function toggleAyetler(col, colX) {
  const world = document.getElementById('world');
  const buApler = col.querySelectorAll('.ap');
  const acikMi = acikSutun === col;

  // Kapat
  if (acikMi) {

  world.querySelectorAll('.ap').forEach(p => { p.style.display = 'none'; });

  // Tüm sure sütunları aşağı kayar (gizlenir)
  const tumCols = Array.from(world.querySelectorAll('.nc'));
  tumCols.forEach(c => {
    if (c !== col) {
      c.style.transition = 'transform .4s ease, opacity .4s ease';
      c.style.transform = 'translateY(120%)';
      c.style.opacity = '0.15';
      c.style.pointerEvents = 'none';
    }
  });

  // Seçili sure sütunu zaman şeridinin sağ kenarına git
  const { w } = vpBoy();
  const hedefColX = (NUZUL.length - 1) * COL_W; // en sağdaki pozisyon
  const guncelColX = parseInt(col.dataset.colX) || colX;

  col.style.transition = 'left .5s cubic-bezier(.4,0,.2,1)';
  col.style.left = hedefColX + 'px';
  col.dataset.colX = hedefColX;

  // Kamerayı o sütuna götür
  setTimeout(() => {
    ortalaCol(hedefColX, Math.min(fersah, 5), 400);
  }, 100);

  // Ayet panelini oluştur
  acikSutun = col;
  col.querySelector('.nh-alt').classList.add('acik');

  // Mevcut ayet panelini temizle
  const eskiPanel = document.getElementById('ayet-panel');
  if (eskiPanel) eskiPanel.remove();

  // Ayet numaralarını yatay panel olarak oluştur
  const panel = document.createElement('div');
  panel.id = 'ayet-panel';
  panel.style.cssText = `
    position: absolute;
    top: ${YB_H}px;
    right: ${(NUZUL.length - 1 - NUZUL.length + 1) * COL_W + COL_W}px;

function buildScene(nuzul) {
  document.getElementById('yukleniyor').style.display = 'none';
  const world = document.getElementById('world');
  // Yıl bandını koru, sütunları temizle
  world.querySelectorAll('.nc').forEach(c => c.remove());
  const N = nuzul.length;
  N_COLS = N;

  nuzul.forEach((n, i) => {
    const sno = n.sure_no;
    const s = SURELER[sno] || { ar: '', tr: '' };
    const med = MEDENI.has(sno);
    const ayetler = (n.ayetler_liste && n.ayetler_liste.length > 0)
      ? n.ayetler_liste : ayetDizi(n.ayetler);

    const col = document.createElement('div');
    col.className = 'nc';
    const colX = (N - 1 - i) * COL_W;
    col.style.left = colX + 'px';
    col.style.top = YB_H + 'px';
    col.dataset.nuzulIdx = i;
    col.dataset.sno = sno;
    col.dataset.ayetBas = ayetler[0] || 1;
    col.dataset.colX = colX;

    // Sure kartı wrap (salınım için)
    const nhWrap = document.createElement('div');
    nhWrap.className = 'nh-wrap';

    // Sure kartı
    const nh = document.createElement('div');
    nh.className = 'nh ' + (med ? 'medeni' : 'mekki');
    nh.innerHTML = `
      <div class="nh-ust">
        <div class="nh-n">${n.sira}</div>
        <div class="nh-ar">${s.ar}</div>
        <div class="nh-tr">${s.tr}</div>
      </div>
      <div class="nh-alt">
        <div class="nh-ay">${n.ayetler}</div>
        <div class="nih">${med ? kubbe() : kabe()}</div>
        <div class="nh-alt-ok">▾</div>
      </div>`;

    // Üst: zoom/ortala
    let ustMd = { x: 0, y: 0 };
    const nhUst = nh.querySelector('.nh-ust');
    nhUst.addEventListener('mousedown', e => { ustMd = { x: e.clientX, y: e.clientY }; });
    nhUst.addEventListener('click', e => {
      e.stopPropagation();
      if (Math.abs(e.clientX - ustMd.x) > 5 || Math.abs(e.clientY - ustMd.y) > 5) return;
      // Sadece ortala, zoom yapma
      ortalaCol(colX, fersah, 500);
    });

    // Alt: ayet kartları akordiyon
    let altMd = { x: 0, y: 0 };
    const nhAlt = nh.querySelector('.nh-alt');
    nhAlt.addEventListener('mousedown', e => { e.stopPropagation(); altMd = { x: e.clientX, y: e.clientY }; });
    nhAlt.addEventListener('click', e => {
      e.stopPropagation();
      if (Math.abs(e.clientX - altMd.x) > 5 || Math.abs(e.clientY - altMd.y) > 5) return;
      toggleAyetler(col, colX);
    });

    nhWrap.appendChild(nh);
    col.appendChild(nhWrap);

    // Ayet kartları
    ayetler.forEach(ano => {
      const p = document.createElement('div');
      p.className = 'ap ' + (med ? 'md' : 'mk');
      const k = `${sno}:${ano}`;
      p.innerHTML = `<div class="ap-n">${ano}</div><div class="ap-ar">${AR_AYET[k] || '·'}</div>`;

      let apMd = { x: 0, y: 0 };
      let longPressTimer = null;

      p.addEventListener('mousedown', e => {
        apMd = { x: e.clientX, y: e.clientY };
        // Long press için timer
        longPressTimer = setTimeout(() => {
          longPressTimer = null;
          ctxMenuAc(e, sno, ano, n);
        }, 600);
      });

      p.addEventListener('mouseup', () => {
        if (longPressTimer) { clearTimeout(longPressTimer); longPressTimer = null; }
      });

      p.addEventListener('contextmenu', e => {
        e.preventDefault();
        if (longPressTimer) { clearTimeout(longPressTimer); longPressTimer = null; }
        ctxMenuAc(e, sno, ano, n);
      });

      p.addEventListener('click', e => {
        e.stopPropagation();
        if (longPressTimer) { clearTimeout(longPressTimer); longPressTimer = null; }
        if (Math.abs(e.clientX - apMd.x) > 5 || Math.abs(e.clientY - apMd.y) > 5) return;
        // Güncel colX'i col dataset'ten al (mushaf sırası değişmiş olabilir)
        const guncelColX = parseInt(col.dataset.colX) || colX;
        if (fersah > 5) { ortalaCol(guncelColX, 5, 500); return; }
        modalAc(sno, ano, n);
      });

      col.appendChild(p);
    });

    world.appendChild(col);
  });

  buildYilBandi(N);

  // Dropdown sure listesini doldur
  buildSureDropdown(nuzul);

  // fitScale hesapla
  const { w, h } = vpBoy();
  fitScale = (w * 0.94) / (N * COL_W);

  // İlk ziyaret mi?
  const ilkZiyaret = !localStorage.getItem('kta_visited');
  if (ilkZiyaret) {
    // Tümünü göster, sonra Fatiha'ya yaklaş
    scale = fitScale;
    tx = (w - N * COL_W * fitScale) / 2;
    ty = h * 0.1;
    applyT();
    localStorage.setItem('kta_visited', '1');
    setTimeout(() => {
      const fatihaCX = (N - 1) * COL_W + COL_W / 2;
      const hScale = fersahToScale(5);
      animateTo(w / 2 - fatihaCX * hScale, h * 0.15, hScale, 1200);
    }, 2000);
  } else {
    // Direkt Fatiha 5. fersahta
    const fatihaCX = (N - 1) * COL_W + COL_W / 2;
    const hScale = fersahToScale(5);
    scale = hScale;
    tx = w / 2 - fatihaCX * hScale;
    ty = h * 0.15;
    applyT();
  }
}

function buildSureDropdown(nuzul) {
  const dd = document.getElementById('sure-dd');
  dd.innerHTML = '';
  // Benzersiz sureleri al, Mushaf sırasına göre
  const goruldu = new Set();
  const sureler = [];
  nuzul.forEach(n => {
    if (!goruldu.has(n.sure_no)) {
      goruldu.add(n.sure_no);
      sureler.push({ sno: n.sure_no, s: SURELER[n.sure_no] || { ar: '', tr: '' } });
    }
  });
  sureler.sort((a, b) => a.sno - b.sno);

  sureler.forEach(({ sno, s }) => {
    const item = document.createElement('div');
    item.className = 'dd-item';
    item.innerHTML = `<span>${s.tr}</span><span class="dd-item-no">${sno}</span>`;
    item.addEventListener('click', () => {
      secilenSureNo = sno;
      ddKapat('sure');
      buildAyetDropdown(sno);
      ddToggle('ayet');
      // O sureye git
      const N = NUZUL.length;
      const idx = NUZUL.findIndex(x => x.sure_no === sno);
      if (idx >= 0) {
        const colX = (N - 1 - idx) * COL_W;
        ortalaCol(colX, 5, 600);
      }
    });
    dd.appendChild(item);
  });
}

function buildAyetDropdown(sno) {
  const dd = document.getElementById('ayet-dd');
  dd.innerHTML = '';
  const N = NUZUL.length;

  // Bu sureye ait tüm nüzul gruplarını bul
  const gruplar = NUZUL.filter(x => x.sure_no === sno);
  gruplar.forEach(grup => {
    const ayetler = (grup.ayetler_liste && grup.ayetler_liste.length > 0)
      ? grup.ayetler_liste : ayetDizi(grup.ayetler);
    ayetler.forEach(ano => {
      const item = document.createElement('div');
      item.className = 'dd-item';
      item.innerHTML = `<span>${sno}:${ano}. Ayet</span><span class="dd-item-no">Nüzul ${grup.sira}</span>`;
      item.addEventListener('click', () => {
        ddKapat('ayet');
        const colX = (N - 1 - NUZUL.indexOf(grup)) * COL_W;
        // Önce sureye git, ayet kartlarını aç, sonra ayete in
        const col = document.querySelector(`[data-nuzul-idx="${NUZUL.indexOf(grup)}"]`);
        ortalaCol(colX, 5, 600);
        setTimeout(() => {
          if (col) toggleAyetler(col, colX);
          setTimeout(() => modalAc(sno, ano, grup), 400);
        }, 700);
      });
      dd.appendChild(item);
    });
  });

  if (dd.children.length === 0) {
    dd.innerHTML = '<div class="sr-bos">Ayet bulunamadı</div>';
  }
}

let ddAcikHangisi = null;

// TEFSİR
// ═══════════════════════════════════════════════════════════
const TEF_SAYFA_BOY = 3000;

function tefsirYukle() {
  const s = SURELER[cSure] || { tr: '' };
  document.getElementById('tef-baslik').textContent = `${s.tr} · ${cAyet}. Ayet Tefsiri`;

  if (!tefsirTam) {
    if (tefsirYukleniyor) {
      document.getElementById('tef-metin').textContent = 'Tefsir metni indiriliyor, lütfen bekleyin...';
      document.getElementById('tef-sayfa').style.display = 'none';
      const bekle = setInterval(() => {
        if (tefsirTam) { clearInterval(bekle); tefsirGoster(); }
      }, 500);
      return;
    }
    document.getElementById('tef-metin').textContent = 'Tefsir verisi yüklenemedi.';
    return;
  }
  tefsirGoster();
}

function tefsirGoster() {
  const re = new RegExp(`###SURE:${cSure}###[\\s\\S]*?##AYET:${cAyet}(?:-\\d+)?##([\\s\\S]*?)(?=##AYET:|###SURE:|$)`);
  const m = tefsirTam.match(re);
  const metin = m && m[1] ? m[1].trim() : 'Bu ayet için tefsir verisi bulunamadı.';

  const parcalar = metin.split('\n\n');
  tefParcalar = [];
  let parca = '';
  parcalar.forEach(p => {
    const d = parca ? parca + '\n\n' + p : p;
    if (d.length > TEF_SAYFA_BOY && parca) { tefParcalar.push(parca); parca = p; }
    else parca = d;
  });
  if (parca) tefParcalar.push(parca);
  if (!tefParcalar.length) tefParcalar = ['Tefsir bulunamadı.'];

  tefIdx = 0;
  tefSayfaGoster();
}

function tefSayfa(yon) {
  tefIdx = Math.max(0, Math.min(tefParcalar.length - 1, tefIdx + yon));
  tefSayfaGoster();
}

function tefSayfaGoster() {
  document.getElementById('tef-metin').textContent = tefParcalar[tefIdx] || '';
  document.getElementById('tef-metin').scrollTop = 0;
  document.getElementById('tef-no').textContent = `${tefIdx + 1} / ${tefParcalar.length}`;
  document.getElementById('tef-geri').disabled = tefIdx === 0;
  document.getElementById('tef-ileri').disabled = tefIdx === tefParcalar.length - 1;
  document.getElementById('tef-sayfa').style.display = tefParcalar.length <= 1 ? 'none' : 'flex';
}

async function tefsiriIndir() {
  tefsirYukleniyor = true;
  try {
    const [r1, r2] = await Promise.all([fetch(PART1_URL), fetch(PART2_URL)]);
    const [t1, t2] = await Promise.all([r1.text(), r2.text()]);
    tefsirTam = t1 + t2;
    console.log('Tefsir yüklendi:', Math.round(tefsirTam.length / 1024 / 1024 * 10) / 10, 'MB');
  } catch (e) {
    console.warn('Tefsir indirilemedi:', e.message);
  }
  tefsirYukleniyor = false;
}

// ARAMA
// ═══════════════════════════════════════════════════════════
function initArama() {
  const inp = document.getElementById('srch');
  const res = document.getElementById('sr-sonuc');

  inp.addEventListener('input', () => {
    clearTimeout(srTimer);
    const q = inp.value.trim();
    if (!q) { res.classList.remove('acik'); return; }
    res.innerHTML = '<div class="sr-bos">Aranıyor...</div>';
    res.classList.add('acik');
    srTimer = setTimeout(() => aramayap(q), 350);
  });

  inp.addEventListener('keydown', e => {
    if (e.key === 'Escape') { res.classList.remove('acik'); inp.blur(); }
    if (e.key === 'Enter') { clearTimeout(srTimer); if (inp.value.trim()) aramayap(inp.value.trim()); }
  });
}

function aramayap(q) {
  const res = document.getElementById('sr-sonuc');
  const ql = q.toLowerCase();
  const hits = [];
  const safe = q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');

  NUZUL.forEach(n => {
    const sno = n.sure_no;
    const s = SURELER[sno] || { ar: '', tr: '' };
    const ayetler = (n.ayetler_liste && n.ayetler_liste.length > 0)
      ? n.ayetler_liste : ayetDizi(n.ayetler);

    // Sure adı araması
    if (s.tr.toLowerCase().includes(ql) || s.ar.includes(q)) {
      hits.push({ sno, ano: ayetler[0] || 1, n, meta: `${s.tr} · Nüzul ${n.sira}`, text: `${n.ayetler}. ayetler` });
    }

    // Meal araması (önbellekteki ayetler)
    ayetler.slice(0, 5).forEach(ano => {
      const k = `${sno}:${ano}`;
      const ar = AR_AYET[k] || '';
      if (ar.includes(q)) {
        hits.push({ sno, ano, n, meta: `${s.tr} · ${ano}. ayet`, text: ar });
      }
    });
  });

  if (!hits.length) { res.innerHTML = '<div class="sr-bos">Sonuç bulunamadı.</div>'; return; }

  res.innerHTML = hits.slice(0, 10).map((h, i) => `
    <div class="sr-item" onclick="aramaGit(${h.sno},${h.ano},${h.n.sira})">
      <div class="sr-meta">${h.meta}</div>
      <div class="sr-text">${h.text}</div>
    </div>`).join('');
}

function aramaGit(sno, ano, sira) {
  const idx = NUZUL.findIndex(x => x.sira === sira);
  if (idx < 0) return;
  const N = NUZUL.length;
  const colX = (N - 1 - idx) * COL_W;
  const col = document.querySelector(`[data-nuzul-idx="${idx}"]`);
  ortalaCol(colX, 5, 600);
  setTimeout(() => {
    if (col) toggleAyetler(col, colX);
    setTimeout(() => modalAc(sno, ano, NUZUL[idx]), 400);
  }, 700);
  document.getElementById('sr-sonuc').classList.remove('acik');
  document.getElementById('srch').value = '';
}

// ═══════════════════════════════════════════════════════════
// MUSHAF / NÜZUL SIRA
// ═══════════════════════════════════════════════════════════
function siraDegis(sira) {
  if (sira === aktifSira) return;
  aktifSira = sira;
  document.getElementById('btn-nuzul').classList.toggle('aktif', sira === 'nuzul');
  document.getElementById('btn-mushaf').classList.toggle('aktif', sira === 'mushaf');
  document.getElementById('yil-bandi').style.display = sira === 'nuzul' ? 'flex' : 'none';

  const world = document.getElementById('world');
  const cols = Array.from(world.querySelectorAll('.nc'));
  const N = cols.length;

  if (sira === 'nuzul') {
    cols.sort((a, b) => parseInt(a.dataset.nuzulIdx) - parseInt(b.dataset.nuzulIdx));
  } else {
    cols.sort((a, b) => {
      const sa = parseInt(a.dataset.sno), sb = parseInt(b.dataset.sno);
      if (sa !== sb) return sa - sb;
      return parseInt(a.dataset.ayetBas || 0) - parseInt(b.dataset.ayetBas || 0);
    });
  }

  cols.forEach((col, newIdx) => {
    const newX = (N - 1 - newIdx) * COL_W;
    col.style.transition = 'left 2s cubic-bezier(.4,0,.2,1)';
    col.style.left = newX + 'px';
    col.dataset.colX = newX;
  });
  setTimeout(() => cols.forEach(c => { c.style.transition = ''; }), 2100);
}

// ═══════════════════════════════════════════════════════════
// SALINIIM ANİMASYONU
// ═══════════════════════════════════════════════════════════
function initSalinim() {
  function tick() {
    if (salinimAktif) {
      const angle = Math.sin((performance.now() % SALINIM_SURE) / SALINIM_SURE * Math.PI * 2) * SALINIM_ACISI;
      document.querySelectorAll('.nh-wrap').forEach(w => {
        w.style.transform = `rotateY(${angle}deg)`;
      });
      document.querySelectorAll('.ap').forEach((p, i) => {
        const offset = (i % 5) / 5 * Math.PI * 0.5;
        const a = Math.sin((performance.now() % SALINIM_SURE) / SALINIM_SURE * Math.PI * 2 + offset) * SALINIM_ACISI;
        if (p.style.display !== 'none') p.style.transform = `rotateY(${a}deg)`;
      });
    }
    requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
}

// ═══════════════════════════════════════════════════════════
// PAN & ZOOM ETKİLEŞİM
// ═══════════════════════════════════════════════════════════
function initEtkilesim() {
  const vp = document.getElementById('vp');
  let panAktif = false, panX = 0, panY = 0, panHareket = false;
  let lastScroll = 0;

  vp.addEventListener('mousedown', e => {
    if (e.target.closest('#modal-bg') || e.target.closest('#ctx-menu')) return;
    panAktif = true; panX = e.clientX; panY = e.clientY; panHareket = false;
    document.body.style.userSelect = 'none';
    document.body.style.webkitUserSelect = 'none';
  });

  window.addEventListener('mouseup', () => {
    panAktif = false;
    document.body.style.userSelect = '';
    document.body.style.webkitUserSelect = '';
  });

  window.addEventListener('mousemove', e => {
    if (!panAktif) return;
    const dx = e.clientX - panX, dy = e.clientY - panY;
    if (Math.abs(dx) > 3 || Math.abs(dy) > 3) panHareket = true;
    tx += dx; ty += dy;
    panX = e.clientX; panY = e.clientY;
    applyT();
  });

  vp.addEventListener('wheel', e => {
    e.preventDefault();
    const rect = vp.getBoundingClientRect();
    const px = e.clientX - rect.left, py = e.clientY - rect.top;

    if (Math.abs(e.deltaX) > Math.abs(e.deltaY) * 1.2) {
      // Yatay kaydırma
      tx -= e.deltaX * 1.2;
      applyT();
      return;
    }

    // Dikey zoom — throttle
    const now = Date.now();
    if (now - lastScroll < 120) return;
    lastScroll = now;
    const yeni = e.deltaY > 0 ? fersah + 1 : fersah - 1;
    zoomPivot(yeni, px, py, 280);
  }, { passive: false });

  // Touch
  let lTx = 0, lTy = 0, lPinch = 0;
  vp.addEventListener('touchstart', e => {
    if (e.touches.length === 1) { lTx = e.touches[0].clientX; lTy = e.touches[0].clientY; }
    if (e.touches.length === 2) lPinch = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
  }, { passive: true });

  vp.addEventListener('touchmove', e => {
    e.preventDefault();
    if (e.touches.length === 1) {
      tx += e.touches[0].clientX - lTx;
      ty += e.touches[0].clientY - lTy;
      lTx = e.touches[0].clientX; lTy = e.touches[0].clientY;
      applyT();
    }
    if (e.touches.length === 2) {
      const d = Math.hypot(e.touches[0].clientX - e.touches[1].clientX, e.touches[0].clientY - e.touches[1].clientY);
      const cx = (e.touches[0].clientX + e.touches[1].clientX) / 2;
      const cy = (e.touches[0].clientY + e.touches[1].clientY) / 2;
      const rect = vp.getBoundingClientRect();
      zoomPivot(d < lPinch ? fersah + 1 : fersah - 1, cx - rect.left, cy - rect.top, 200);
      lPinch = d;
    }
  }, { passive: false });

  // Klavye
  window.addEventListener('keydown', e => {
    if (e.target.tagName === 'INPUT') return;
    const adim = 80;
    switch (e.key) {
      case 'ArrowLeft': tx += adim; applyT(); break;
      case 'ArrowRight': tx -= adim; applyT(); break;
      case 'ArrowUp': ty += adim; applyT(); break;
      case 'ArrowDown': ty -= adim; applyT(); break;
      case '+': case '=': zoomPivot(fersah - 1, vpBoy().w / 2, vpBoy().h / 2, 300); break;
      case '-': zoomPivot(fersah + 1, vpBoy().w / 2, vpBoy().h / 2, 300); break;
      case 'Home': {
        const N = NUZUL.length;
        if (N) ortalaCol((N - 1) * COL_W, fersah, 500);
        break;
      }
      case 'End': {
        if (NUZUL.length) ortalaCol(0, fersah, 500);
        break;
      }
      case 'Escape': {
        if (modalAcik) modalKapat();
        else if (ddAcikHangisi) ddKapat(ddAcikHangisi);
        break;
      }
    }
  });
}

// ═══════════════════════════════════════════════════════════
// YILDIZLAR
// ═══════════════════════════════════════════════════════════
function initYildizlar() {
  const cv = document.getElementById('stars');
  function rsz() { cv.width = window.innerWidth; cv.height = window.innerHeight; }
  rsz(); window.addEventListener('resize', rsz);
  const ctx = cv.getContext('2d');
  const S = Array.from({ length: 300 }, () => ({
    x: Math.random() * cv.width, y: Math.random() * cv.height,
    r: Math.random() * 1.2 + .2, a: Math.random(),
    s: Math.random() * .008 + .002, d: Math.random() > .5 ? 1 : -1
  }));
  const B = Array.from({ length: 10 }, () => ({
    x: Math.random() * cv.width, y: Math.random() * cv.height,
    r: Math.random() * 1.8 + .8, t: Math.random() * 6.28, sp: Math.random() * .02 + .007
  }));
  function draw() {
    ctx.clearRect(0, 0, cv.width, cv.height);
    S.forEach(s => {
      s.a += s.s * s.d;
      if (s.a > 1 || s.a < .08) s.d *= -1;
      ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, 6.28);
      ctx.fillStyle = `rgba(255,255,240,${s.a * .65})`; ctx.fill();
    });
    B.forEach(b => {
      b.t += b.sp;
      const p = Math.sin(b.t) * .5 + .5;
      ctx.beginPath(); ctx.arc(b.x, b.y, b.r * (.3 + p * .7), 0, 6.28);
      ctx.fillStyle = `rgba(201,169,110,${p * .7})`; ctx.fill();
    });
    requestAnimationFrame(draw);
  }
  draw();
}

// ═══════════════════════════════════════════════════════════
// BAŞLAT
// ═══════════════════════════════════════════════════════════
async function init() {
  initYildizlar();
  initEtkilesim();
  initArama();

  try {
    const r = await fetch(NUZUL_URL);
    NUZUL = await r.json();
    buildScene(NUZUL);
    initSalinim();
  } catch (e) {
    document.getElementById('yukleniyor').innerHTML =
      '<div style="color:rgba(201,169,110,.5);font-size:12px;text-align:center">Veri yüklenemedi.<br>İnternet bağlantınızı kontrol edin.</div>';
    console.error(e);
  }

  // Tefsiri arka planda indir
  tefsiriIndir();
}

init();
</script>
