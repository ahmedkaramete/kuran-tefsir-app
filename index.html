<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>القرآن الكريم</title>
<link href="https://fonts.googleapis.com/css2?family=Amiri:ital@0;1&display=swap" rel="stylesheet">
<style>
/* ═══════════════════════════════════════════════════════
   RESET & TEMEL
═══════════════════════════════════════════════════════ */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #080818; }
body { font-family: system-ui, -apple-system, sans-serif; color: #e0d8c8; }

/* ═══════════════════════════════════════════════════════
   DEĞİŞKENLER
═══════════════════════════════════════════════════════ */
:root {
  --altin: #c9a96e;
  --altin-soluk: rgba(201,169,110,.35);
  --altin-cok-soluk: rgba(201,169,110,.12);
  --yesil: rgba(80,190,140,.7);
  --kart-bg: linear-gradient(160deg, rgba(38,35,72,.97), rgba(24,20,56,.97));
  --kart-border: rgba(201,169,110,.36);
  --topbar-h: 52px;
  --yb-h: 260px;
  --col-w: 72px;
}

/* ═══════════════════════════════════════════════════════
   TOPBAR
═══════════════════════════════════════════════════════ */
#topbar {
  position: fixed; top: 0; left: 0; right: 0;
  height: var(--topbar-h);
  background: rgba(8,8,24,.96);
  border-bottom: .5px solid var(--altin-soluk);
  display: flex; align-items: center; gap: 10px;
  padding: 0 14px; z-index: 100;
}
.brand { flex-shrink: 0; }
.brand-ar { font-family: 'Amiri', serif; font-size: 18px; color: var(--altin); direction: rtl; }
.brand-sub { font-size: 8px; color: rgba(201,169,110,.4); letter-spacing: 2px; margin-top: 1px; }

/* Arama */
#srch-wrap { position: relative; flex: 1; max-width: 260px; }
#srch {
  width: 100%; background: var(--altin-cok-soluk);
  border: .5px solid var(--altin-soluk); border-radius: 20px;
  color: #e8e0d0; padding: 6px 12px 6px 30px; font-size: 11px; outline: none;
}
#srch::placeholder { color: rgba(201,169,110,.35); }
.srch-icon { position: absolute; left: 9px; top: 50%; transform: translateY(-50%); opacity: .45; pointer-events: none; }
#srch-results {
  position: absolute; top: 34px; left: 0; right: 0; min-width: 320px;
  background: rgba(8,8,26,.98); border: .5px solid var(--altin-soluk);
  border-radius: 8px; max-height: 300px; overflow-y: auto;
  display: none; z-index: 200; box-shadow: 0 8px 28px rgba(0,0,0,.7);
}
#srch-results.open { display: block; }
#srch-results::-webkit-scrollbar { width: 3px; }
#srch-results::-webkit-scrollbar-thumb { background: var(--altin-soluk); }
.sr-item { padding: 7px 11px; border-bottom: .5px solid rgba(201,169,110,.07); cursor: pointer; display: grid; grid-template-columns: 100px 1fr; gap: 7px; }
.sr-item:hover { background: var(--altin-cok-soluk); }
.sr-meta { font-size: 9px; color: rgba(201,169,110,.6); line-height: 1.5; }
.sr-text { font-size: 10.5px; color: rgba(220,210,190,.78); line-height: 1.5; }
.sr-hl { color: var(--altin); background: rgba(201,169,110,.14); border-radius: 2px; padding: 0 2px; }
.sr-empty { padding: 10px; text-align: center; color: rgba(201,169,110,.38); font-size: 10.5px; }

/* Sure & Ayet menüleri */
.dd-wrap { position: relative; }
.dd-btn {
  background: var(--altin-cok-soluk); border: .5px solid var(--altin-soluk);
  border-radius: 16px; color: var(--altin); padding: 5px 10px;
  font-size: 10px; cursor: pointer; white-space: nowrap;
  display: flex; align-items: center; gap: 4px;
}
.dd-btn:hover { background: rgba(201,169,110,.18); }
.dd-arrow { font-size: 8px; transition: transform .2s; }
.dd-btn.open .dd-arrow { transform: rotate(180deg); }
.dd-list {
  position: absolute; top: 32px; left: 0;
  background: rgba(8,8,26,.98); border: .5px solid var(--altin-soluk);
  border-radius: 8px; max-height: 280px; overflow-y: auto;
  display: none; z-index: 200; min-width: 180px;
  box-shadow: 0 8px 28px rgba(0,0,0,.7);
}
.dd-list.open { display: block; }
.dd-list::-webkit-scrollbar { width: 3px; }
.dd-list::-webkit-scrollbar-thumb { background: var(--altin-soluk); }
.dd-item { padding: 7px 12px; cursor: pointer; font-size: 11px; color: rgba(220,210,190,.78); border-bottom: .5px solid rgba(201,169,110,.06); white-space: nowrap; }
.dd-item:hover { background: var(--altin-cok-soluk); color: var(--altin); }

/* Sıra butonları */
.sira-btns { display: flex; gap: 4px; flex-shrink: 0; }
.btn-sira {
  background: rgba(255,255,255,.04); border: .5px solid rgba(255,255,255,.15);
  border-radius: 16px; color: rgba(255,255,255,.45); padding: 5px 10px;
  font-size: 10px; cursor: pointer; white-space: nowrap; transition: all .2s;
}
.btn-sira:hover { background: var(--altin-cok-soluk); border-color: var(--altin-soluk); color: var(--altin); }
.btn-sira.aktif { background: rgba(201,169,110,.14); border-color: rgba(201,169,110,.6); color: var(--altin); }
#btn-fit {
  background: var(--altin-cok-soluk); border: .5px solid var(--altin-soluk);
  border-radius: 16px; color: var(--altin); padding: 5px 10px;
  font-size: 10px; cursor: pointer; white-space: nowrap; transition: background .15s;
}
#btn-fit:hover { background: rgba(201,169,110,.22); }

/* Fersah göstergesi */
#fersah-ind {
  position: fixed; top: calc(var(--topbar-h) + 6px); right: 12px;
  font-size: 9px; color: rgba(201,169,110,.38); letter-spacing: 1px; z-index: 50;
  pointer-events: none;
}

/* ═══════════════════════════════════════════════════════
   VIEWPORT & WORLD
═══════════════════════════════════════════════════════ */
#vp {
  position: fixed; inset: 0; top: var(--topbar-h);
  overflow: hidden; cursor: grab; z-index: 1;
}
#vp:active { cursor: grabbing; }
#world { position: absolute; top: 0; left: 0; transform-origin: left top; will-change: transform; }

/* ═══════════════════════════════════════════════════════
   YIL BANDI
═══════════════════════════════════════════════════════ */
#year-band {
  position: absolute; top: 0; left: 0;
  height: var(--yb-h); display: flex; flex-direction: row-reverse;
  pointer-events: auto;
}
.yb-seg {
  flex-shrink: 0; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  border-right: 1px solid rgba(201,169,110,.15);
  cursor: pointer; transition: filter .2s; overflow: hidden;
  padding: 8px 4px;
}
.yb-seg:hover { filter: brightness(1.4); }
.yb-mekke { background: linear-gradient(to bottom, rgba(201,169,110,.02), rgba(201,169,110,.1)); }
.yb-hicr  { background: linear-gradient(to bottom, rgba(255,210,80,.05), rgba(255,210,80,.2)); border-color: rgba(255,210,80,.5); }
.yb-medine{ background: linear-gradient(to bottom, rgba(80,190,140,.02), rgba(80,190,140,.1)); }
.yb-yil   { font-size: 11px; font-weight: 800; line-height: 1; transform-origin: center; }
.yb-nub   { font-size: 9px; margin-top: 4px; opacity: .75; transform-origin: center; }
.yb-hicri { font-size: 9px; margin-top: 2px; opacity: .75; transform-origin: center; }
.yb-miladi{ font-size: 9px; margin-top: 2px; opacity: .65; transform-origin: center; }
.yb-mekke .yb-yil, .yb-mekke .yb-nub, .yb-mekke .yb-hicri, .yb-mekke .yb-miladi { color: rgba(201,169,110,.85); }
.yb-hicr  .yb-yil, .yb-hicr  .yb-nub, .yb-hicr  .yb-hicri, .yb-hicr  .yb-miladi { color: rgba(255,215,90,.95); }
.yb-medine .yb-yil,.yb-medine .yb-nub,.yb-medine .yb-hicri,.yb-medine .yb-miladi { color: rgba(80,190,140,.85); }

/* ═══════════════════════════════════════════════════════
   SURE KARTLARI
═══════════════════════════════════════════════════════ */
.nc {
  position: absolute; display: flex; flex-direction: column; align-items: center;
  width: var(--col-w); user-select: none; -webkit-user-select: none;
}
.nh-wrap { position: relative; width: 64px; transform-style: preserve-3d; flex-shrink: 0; }
.nh {
  width: 64px; background: var(--kart-bg);
  border: .5px solid var(--kart-border); border-radius: 6px;
  overflow: hidden; position: relative; z-index: 2;
  transform-style: preserve-3d;
}
.nh.mekki  { border-left: 2px solid rgba(201,169,110,.6); }
.nh.medeni { border-left: 2px solid rgba(80,190,140,.6); }
/* Sure kartı üst: zoom bölgesi */
.nh-ust { padding: 5px 3px 3px; cursor: pointer; }
.nh-ust:hover { background: rgba(201,169,110,.07); }
/* Sure kartı alt: ayet aç bölgesi */
.nh-alt {
  padding: 2px 3px 4px; border-top: .5px solid rgba(201,169,110,.15);
  cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 3px;
}
.nh-alt:hover { background: rgba(80,190,140,.08); }
.nh-alt-arrow { font-size: 8px; color: rgba(201,169,110,.5); transition: transform .2s; }
.nh-alt.acik .nh-alt-arrow { transform: rotate(180deg); }
/* 3D kenarlar */
.nh-side {
  position: absolute; top: 2px; bottom: -5px; right: -9px; width: 9px;
  background: linear-gradient(to right, rgba(201,169,110,.3), rgba(201,169,110,.05));
  border-radius: 0 3px 3px 0; pointer-events: none;
}
.nh.medeni ~ .nh-side { background: linear-gradient(to right, rgba(80,190,140,.3), rgba(80,190,140,.05)); }
.nh-bot {
  position: absolute; left: 2px; right: -6px; bottom: -8px; height: 8px;
  background: linear-gradient(to bottom, rgba(201,169,110,.22), rgba(201,169,110,.04));
  border-radius: 0 0 3px 3px; pointer-events: none;
}
/* Sure kartı içi */
.nh-n  { font-size: 7.5px; color: rgba(201,169,110,.52); text-align: center; }
.nh-ar { font-size: 12px; color: #d4b47a; font-family: 'Amiri', serif; direction: rtl; line-height: 1.35; margin: 2px 0 1px; text-align: center; }
.nh-tr { font-size: 7px; color: rgba(220,215,200,.7); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; max-width: 60px; text-align: center; }
.nh-ay { font-size: 6.5px; color: rgba(201,169,110,.3); margin-top: 1px; text-align: center; }
.nih   { display: flex; justify-content: center; gap: 3px; margin-top: 1px; }

/* ═══════════════════════════════════════════════════════
   AYET KARTLARI
═══════════════════════════════════════════════════════ */
.ap {
  width: 56px; min-height: 28px;
  background: rgba(255,255,255,.055); border: .5px solid rgba(255,255,255,.1);
  border-radius: 4px; margin-top: 3px;
  display: none; /* başlangıçta gizli */
  flex-direction: column; align-items: center; justify-content: center;
  cursor: pointer; padding: 3px 2px;
  transform-style: preserve-3d;
  position: relative;
  user-select: none; -webkit-user-select: none;
  opacity: 0; transition: opacity .2s, transform .2s;
}
.ap.gorünür { display: flex; }
.ap.acik { opacity: 1; }
.ap.mk { border-left: 1.5px solid rgba(201,169,110,.5); }
.ap.md { border-left: 1.5px solid rgba(80,190,140,.5); }
.ap:hover { background: rgba(201,169,110,.14); border-color: rgba(201,169,110,.4); z-index: 10; }
/* 3D kenar */
.ap::after {
  content: ''; position: absolute; top: 1px; bottom: -4px; right: -6px; width: 6px;
  background: linear-gradient(to right, rgba(201,169,110,.2), rgba(201,169,110,.04));
  border-radius: 0 2px 2px 0; pointer-events: none;
}
.ap-n  { font-size: 7.5px; color: rgba(201,169,110,.5); }
.ap-ar { font-size: 8px; color: rgba(230,220,200,.5); font-family: 'Amiri', serif; direction: rtl; text-align: center; line-height: 1.25; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }

/* ═══════════════════════════════════════════════════════
   LEGEND & HINT
═══════════════════════════════════════════════════════ */
#legend {
  position: fixed; bottom: 28px; right: 14px; z-index: 10;
  display: flex; flex-direction: column; gap: 4px;
}
.leg-item { display: flex; align-items: center; gap: 5px; font-size: 9px; color: rgba(201,169,110,.5); }
.leg-dot  { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
#hint {
  position: fixed; bottom: 8px; left: 50%; transform: translateX(-50%);
  font-size: 8px; color: rgba(201,169,110,.2); letter-spacing: 1px;
  pointer-events: none; white-space: nowrap; z-index: 10;
}

/* ═══════════════════════════════════════════════════════
   LOADING
═══════════════════════════════════════════════════════ */
#loading {
  position: fixed; inset: 0; top: var(--topbar-h);
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  z-index: 50; gap: 14px;
}
.ldot { display: flex; gap: 8px; }
.ldot span { width: 7px; height: 7px; border-radius: 50%; background: var(--altin); animation: ldp 1.2s infinite; }
.ldot span:nth-child(2) { animation-delay: .2s; }
.ldot span:nth-child(3) { animation-delay: .4s; }
@keyframes ldp { 0%,80%,100%{opacity:.2;transform:scale(.8)} 40%{opacity:1;transform:scale(1)} }
.ltxt  { font-size: 13px; color: rgba(201,169,110,.5); font-family: 'Amiri', serif; }
.ltxt2 { font-size: 10px; color: rgba(201,169,110,.3); letter-spacing: 2px; margin-top: 4px; }

/* ═══════════════════════════════════════════════════════
   MODAL (AYET KARTI FLIP)
═══════════════════════════════════════════════════════ */
#modal-ov {
  position: fixed; inset: 0; top: var(--topbar-h);
  background: rgba(4,4,18,.88); z-index: 200;
  display: none; align-items: center; justify-content: center;
  backdrop-filter: blur(6px);
}
#modal-ov.open { display: flex; }
#modal-wrap {
  width: 340px; max-width: 92vw; height: 520px;
  perspective: 1000px; cursor: pointer;
}
#modal-card {
  width: 100%; height: 100%;
  transform-style: preserve-3d;
  transition: transform .7s cubic-bezier(.4,0,.2,1);
  position: relative;
}
#modal-card.flipped { transform: rotateY(180deg); }
.modal-face {
  position: absolute; inset: 0; backface-visibility: hidden;
  border-radius: 14px; padding: 20px;
  display: flex; flex-direction: column; overflow: hidden;
}
.modal-on  { background: linear-gradient(145deg, #0e0e2c, #181838); border: .5px solid rgba(201,169,110,.28); }
.modal-arka{ background: linear-gradient(145deg, #0a1d16, #10251e); border: .5px solid rgba(80,190,140,.28); transform: rotateY(180deg); }
.modal-kapat {
  position: absolute; top: 10px; right: 12px;
  background: none; border: none; color: rgba(255,255,255,.3);
  font-size: 17px; cursor: pointer; z-index: 5; line-height: 1;
}
.modal-kapat:hover { color: rgba(255,255,255,.8); }
.modal-badge {
  display: inline-flex; align-items: center; gap: 5px;
  background: rgba(201,169,110,.1); border: .5px solid rgba(201,169,110,.2);
  border-radius: 20px; padding: 3px 10px; font-size: 10px; color: var(--altin);
  margin-bottom: 8px; width: fit-content;
}
.modal-dates { display: flex; gap: 4px; margin-bottom: 10px; flex-wrap: wrap; }
.mds-b { font-size: 8px; padding: 2px 7px; border-radius: 3px; }
.mds-1 { background: rgba(201,169,110,.12); color: rgba(201,169,110,.8); }
.mds-2 { background: rgba(100,180,160,.12); color: rgba(100,180,160,.8); }
.mds-3 { background: rgba(140,140,210,.12); color: rgba(140,140,210,.8); }
.modal-ar  { font-family: 'Amiri', serif; font-size: 21px; line-height: 1.9; direction: rtl; text-align: right; color: #f0e8d8; border-bottom: .5px solid rgba(255,255,255,.07); padding-bottom: 10px; margin-bottom: 10px; flex-shrink: 0; }
.modal-meal{ font-size: 13px; line-height: 1.8; color: rgba(220,210,195,.88); flex: 1; overflow-y: auto; }
.modal-meal::-webkit-scrollbar { width: 2px; }
.modal-meal::-webkit-scrollbar-thumb { background: rgba(201,169,110,.3); }
.modal-acts{ display: flex; gap: 6px; margin-top: 10px; flex-shrink: 0; }
.act-btn { flex: 1; background: rgba(201,169,110,.07); border: .5px solid rgba(201,169,110,.26); color: var(--altin); padding: 8px; border-radius: 7px; font-size: 11px; cursor: pointer; transition: background .15s; }
.act-btn:hover { background: rgba(201,169,110,.15); }
.act-btn.calisiyor { background: rgba(201,169,110,.22); border-color: var(--altin); }
.ses-bar  { height: 2px; background: rgba(201,169,110,.1); border-radius: 1px; margin-top: 5px; flex-shrink: 0; }
.ses-dolu { height: 100%; background: var(--altin); width: 0%; transition: width .3s; border-radius: 1px; }
/* Arka yüz (tefsir) */
.tef-baslik{ font-size: 12px; color: rgba(100,180,160,.8); font-weight: 600; margin-bottom: 6px; flex-shrink: 0; }
.tef-kaynak{ font-size: 9px; color: rgba(100,180,160,.45); background: rgba(100,180,160,.05); border: .5px solid rgba(100,180,160,.1); border-radius: 4px; padding: 3px 8px; margin-bottom: 8px; flex-shrink: 0; }
.tef-metin { font-size: 11.5px; line-height: 1.85; color: rgba(210,230,225,.85); flex: 1; overflow-y: auto; white-space: pre-wrap; }
.tef-metin::-webkit-scrollbar { width: 2px; }
.tef-metin::-webkit-scrollbar-thumb { background: rgba(100,180,160,.3); }
.tef-sayfa { display: flex; align-items: center; justify-content: space-between; margin-top: 8px; padding-top: 6px; border-top: .5px solid rgba(100,180,160,.12); flex-shrink: 0; }
.tef-pg-btn{ background: rgba(100,180,160,.08); border: .5px solid rgba(100,180,160,.25); color: rgba(100,180,160,.8); padding: 4px 10px; border-radius: 5px; font-size: 10px; cursor: pointer; }
.tef-pg-btn:disabled { opacity: .3; cursor: not-allowed; }
.tef-pg-inf{ font-size: 9px; color: rgba(100,180,160,.5); }

/* ═══════════════════════════════════════════════════════
   CONTEXT MENU
═══════════════════════════════════════════════════════ */
#ctx-menu {
  position: fixed; background: rgba(8,8,26,.97);
  border: .5px solid rgba(201,169,110,.3); border-radius: 8px;
  padding: 4px 0; z-index: 300; display: none; min-width: 160px;
  box-shadow: 0 8px 24px rgba(0,0,0,.6);
}
#ctx-menu.open { display: block; }
.ctx-item { padding: 8px 14px; font-size: 11px; color: rgba(220,210,190,.78); cursor: pointer; display: flex; align-items: center; gap: 8px; }
.ctx-item:hover { background: rgba(201,169,110,.1); color: var(--altin); }
.ctx-sep { height: .5px; background: rgba(201,169,110,.15); margin: 3px 0; }

/* ═══════════════════════════════════════════════════════
   YILDIZLAR
═══════════════════════════════════════════════════════ */
#stars { position: fixed; inset: 0; pointer-events: none; z-index: 0; }
</style>
</head>
<body>
<canvas id="stars"></canvas>

<!-- TOPBAR -->
<div id="topbar">
  <div class="brand">
    <div class="brand-ar">القرآن الكريم</div>
    <div class="brand-sub">NÜZUL ZAMAN ŞERİDİ</div>
  </div>

  <!-- Sure menüsü -->
  <div class="dd-wrap" id="sure-dd-wrap">
    <button class="dd-btn" id="sure-dd-btn" onclick="ddToggle('sure')">
      Sure <span class="dd-arrow">▼</span>
    </button>
    <div class="dd-list" id="sure-dd-list"></div>
  </div>

  <!-- Ayet menüsü -->
  <div class="dd-wrap" id="ayet-dd-wrap">
    <button class="dd-btn" id="ayet-dd-btn" onclick="ddToggle('ayet')">
      Ayet <span class="dd-arrow">▼</span>
    </button>
    <div class="dd-list" id="ayet-dd-list"></div>
  </div>

  <!-- Arama -->
  <div id="srch-wrap">
    <svg class="srch-icon" width="13" height="13" viewBox="0 0 16 16" fill="none">
      <circle cx="6.5" cy="6.5" r="4.5" stroke="#c9a96e" stroke-width="1.3"/>
      <path d="M10 10l3 3" stroke="#c9a96e" stroke-width="1.3" stroke-linecap="round"/>
    </svg>
    <input id="srch" type="text" placeholder="Meal, sure veya ayet ara..." autocomplete="off">
    <div id="srch-results"></div>
  </div>

  <!-- Sıra butonları -->
  <div class="sira-btns">
    <button class="btn-sira aktif" id="btn-nuzul" onclick="siraDegis('nuzul')">Nüzul</button>
    <button class="btn-sira" id="btn-mushaf" onclick="siraDegis('mushaf')">Mushaf</button>
  </div>
  <button id="btn-fit" onclick="fitAll()">⊞ Tümü</button>
</div>

<div id="fersah-ind">13. FERSAH</div>

<!-- VIEWPORT -->
<div id="vp">
  <div id="world">
    <div id="year-band"></div>
  </div>
</div>

<!-- LEGEND -->
<div id="legend">
  <div class="leg-item"><div class="leg-dot" style="background:rgba(201,169,110,.72)"></div>Mekki</div>
  <div class="leg-item"><div class="leg-dot" style="background:rgba(80,190,140,.72)"></div>Medeni</div>
</div>
<div id="hint">TIK · KART AÇ &nbsp;|&nbsp; ÇİFT TIK · ZOOM &nbsp;|&nbsp; UZUN BAS · SEÇENEKLER &nbsp;|&nbsp; SCROLL · ZOOM &nbsp;|&nbsp; SÜRÜKLE · GEZİN</div>

// ═══════════════════════════════════════════════════════
// YARDIMCI FONKSİYONLAR
// ═══════════════════════════════════════════════════════
function vpBoyut() {
  const vp = document.getElementById('vp');
  return { w: vp.clientWidth, h: vp.clientHeight };
}

function fersahToScale(f) {
  return fitScale * Math.pow(ZOOM_C, FERSAH_N - f);
}

function scaleToFersah(s) {
  return FERSAH_N - Math.log(s / fitScale) / Math.log(ZOOM_C);
}

function ayetDizi(str) {
  if (!str) return [];
  const p = String(str).split('-').map(s => parseInt(s));
  if (isNaN(p[0])) return [];
  if (p.length === 1) return [p[0]];
  const a = [];
  for (let i = p[0]; i <= p[1]; i++) a.push(i);
  return a;
}

function tarihHesapla(sira) {
  const nubYil  = Math.min(13, Math.ceil(sira / (80/13)));
  const nub     = `Nübüvvet ${nubYil}. Yıl`;
  const hicriOnce = sira <= 80 ? Math.round((80 - sira) / 80 * 13) + 1 : 0;
  const hicri   = sira <= 80
    ? `Hicret Öncesi ${hicriOnce}. Yıl`
    : `H. ${Math.ceil((sira - 80) / 18) + 1}. Yıl`;
  const miladi  = sira <= 1 ? 'M.S. ~610'
    : sira <= 80 ? `M.S. ~${610 + Math.floor(sira / 10)}`
    : `M.S. ~${622 + Math.ceil((sira - 80) / 18)}`;
  return { nub, hicri, miladi };
}

// ═══════════════════════════════════════════════════════
// TRANSFORM & ANİMASYON
// ═══════════════════════════════════════════════════════
function applyT() {
  const world = document.getElementById('world');
  world.style.transform = `translate(${tx}px,${ty}px) scale(${scale})`;

  // Yıl bandı yazıları: zoom'dan bağımsız
  const inv = 1 / scale;
  document.querySelectorAll('.yb-yil, .yb-nub, .yb-hicri, .yb-miladi').forEach(el => {
    el.style.transform = `scale(${inv})`;
  });

  // Fersah göstergesi
  const goster = Math.max(1, Math.min(FERSAH_N, Math.round(scaleToFersah(scale))));
  document.getElementById('fersah-ind').textContent = goster + '. FERSAH';

  // Sınır kontrolü (3-2-1. fersahta)
  if (goster <= 3) sinirUygula();
}

function sinirUygula() {
  if (!NUZUL.length) return;
  const { w, h } = vpBoyut();
  const N = NUZUL.length;
  const worldW = N * COL_W * scale;
  const worldH = (YB_H + 200) * scale; // yaklaşık

  // Yatay: en az bir kart görünür kalsın
  const minTx = w - worldW - COL_W * scale;
  const maxTx = COL_W * scale;
  tx = Math.max(minTx, Math.min(maxTx, tx));

  // Dikey: üstte yıl bandı kaybolmasın
  const minTy = h - worldH - 100;
  const maxTy = 20;
  ty = Math.max(minTy, Math.min(maxTy, ty));
}

function animTo(tTx, tTy, tScale, dur, cb) {
  if (animKare) cancelAnimationFrame(animKare);
  const s0 = scale, tx0 = tx, ty0 = ty, t0 = performance.now();
  function step(t) {
    const p  = Math.min(1, (t - t0) / dur);
    const e  = 1 - Math.pow(1 - p, 3); // ease out cubic
    scale = s0 + (tScale - s0) * e;
    tx    = tx0 + (tTx - tx0) * e;
    ty    = ty0 + (tTy - ty0) * e;
    applyT();
    if (p < 1) animKare = requestAnimationFrame(step);
    else { scale = tScale; tx = tTx; ty = tTy; applyT(); if (cb) cb(); }
  }
  animKare = requestAnimationFrame(step);
}

// ═══════════════════════════════════════════════════════
// ZOOM
// ═══════════════════════════════════════════════════════
function fitAll() {
  if (!NUZUL.length) return;
  const { w, h } = vpBoyut();
  const N = NUZUL.length;
  fitScale = (w * 0.94) / (N * COL_W);
  fersah   = FERSAH_N;
  const tTx = (w - N * COL_W * fitScale) / 2;
  const tTy = h * 0.1;
  animTo(tTx, tTy, fitScale, 700);
}

function sutunOrtala(colWorldX, hedefFersah, dur) {
  const { w, h } = vpBoyut();
  hedefFersah = Math.max(1, Math.min(FERSAH_N, hedefFersah));
  const hScale = fersahToScale(hedefFersah);
  const cx     = colWorldX + COL_W / 2;
  const tTx    = w / 2 - cx * hScale;
  const tTy    = Math.max(h * 0.08, ty);
  fersah       = hedefFersah;
  animTo(tTx, tTy, hScale, dur || 600);
}

function zoomPivot(yeniFersah, pivX, pivY, dur) {
  yeniFersah = Math.max(1, Math.min(FERSAH_N, yeniFersah));
  const yeniScale = fersahToScale(yeniFersah);
  const wx = (pivX - tx) / scale;
  const wy = (pivY - ty) / scale;
  fersah   = yeniFersah;
  animTo(pivX - wx * yeniScale, pivY - wy * yeniScale, yeniScale, dur || 300);
}

// ═══════════════════════════════════════════════════════
// YIL BANDI
// ═══════════════════════════════════════════════════════
function buildYearBand(N) {
  const yb   = document.getElementById('year-band');
  yb.innerHTML = '';
  yb.style.width  = (N * COL_W) + 'px';
  yb.style.height = YB_H + 'px';

  const yilSayisi  = 22; // 610-631
  const colsPerYil = N / yilSayisi;

  for (let y = 0; y < yilSayisi; y++) {
    const yr   = 610 + y;
    const cols = y === yilSayisi - 1
      ? N - Math.round(colsPerYil) * (yilSayisi - 1)
      : Math.round(colsPerYil);

    const sinif = yr === 622 ? 'yb-hicr' : yr < 622 ? 'yb-mekke' : 'yb-medine';
    const seg   = document.createElement('div');
    seg.className = 'yb-seg ' + sinif;
    seg.style.width  = (cols * COL_W) + 'px';
    seg.style.height = YB_H + 'px';

    // Tıklayınca o yıla git
    const startCol = Math.round(colsPerYil * y);
    const colX     = (N - 1 - startCol) * COL_W;
    seg.onclick    = () => sutunOrtala(colX, 5, 700);

    // 3 satır tarih
    const nubYil    = yr <= 622 ? yr - 609 : null;
    const hicriOnce = yr < 622  ? 622 - yr : null;
    const hicriSonra= yr >= 622 ? yr - 622 : null;
    const nubTxt    = nubYil    ? `Nübüvvet ${nubYil}. Yıl` : 'Sonrası';
    const hicriTxt  = yr === 622 ? 'Hicret Yılı'
      : hicriOnce  ? `Hicret Öncesi ${hicriOnce}. Yıl`
      : `Hicret Sonrası ${hicriSonra}. Yıl`;
    const yilLabel  = yr === 622 ? '✦ 622' : yr === 610 ? '▶ 610' : yr === 631 ? '◼ 632' : String(yr);

    seg.innerHTML = `
      <div class="yb-yil">${yilLabel}</div>
      <div class="yb-nub">${nubTxt}</div>
      <div class="yb-hicri">${hicriTxt}</div>
      <div class="yb-miladi">M.S. ${yr}</div>
    `;
    yb.appendChild(seg);
  }
}

function ayetAc(col, colWorldX) {
  const buApler  = col.querySelectorAll('.ap');
  const acikMi   = buApler.length > 0 && buApler[0].classList.contains('acik');

  // Önce tüm açıkları kapat
  if (acikSutun && acikSutun !== col) {
    acikSutun.querySelectorAll('.ap').forEach(p => {
      p.classList.remove('acik');
      setTimeout(() => p.classList.remove('gorünür'), 220);
    });
    const eskiAlt = acikSutun.querySelector('.nh-alt');
    if (eskiAlt) eskiAlt.classList.remove('acik');
    acikSutun = null;
  }

  if (acikMi) {
    // Kapat
    buApler.forEach(p => {
      p.classList.remove('acik');
      setTimeout(() => p.classList.remove('gorünür'), 220);
    });
    const nhAlt = col.querySelector('.nh-alt');
    if (nhAlt) nhAlt.classList.remove('acik');
    acikSutun = null;
  } else {
    // Aç
    acikSutun = col;
    const nhAlt = col.querySelector('.nh-alt');
    if (nhAlt) nhAlt.classList.add('acik');

    buApler.forEach((p, i) => {
      p.classList.add('gorünür');
      setTimeout(() => {
        p.style.transform = 'translateY(-6px)';
        p.classList.add('acik');
        setTimeout(() => { p.style.transform = ''; }, 20);
      }, i * 25);
    });

    // Gerekirse yaklaş
    const guncelFersah = Math.round(scaleToFersah(scale));
    sutunOrtala(colWorldX, Math.min(guncelFersah, 5), 500);
  }
}

function buildScene(nuzul) {

  const world = document.getElementById('world');
  world.querySelectorAll('.nc').forEach(c => c.remove());
  const N = nuzul.length;

  nuzul.forEach((n, i) => {
    const sno     = n.sure_no;
    const s       = SURELER[sno] || { ar: '', tr: '' };
    const med     = MEDENI.has(sno);
    const ayetler = (n.ayetler_liste && n.ayetler_liste.length > 0)
      ? n.ayetler_liste : ayetDizi(n.ayetler);
    const colX    = (N - 1 - i) * COL_W;

    const col = document.createElement('div');
    col.className     = 'nc';
    col.style.left    = colX + 'px';
    col.style.top     = YB_H + 'px';
    col.dataset.nuzulIdx = i;
    col.dataset.sno      = sno;
    col.dataset.ayetBas  = ayetler[0] || 1;
    col.dataset.colX     = colX;

    // Sure kartı
    const nhWrap = document.createElement('div');
    nhWrap.className = 'nh-wrap';

    const nh = document.createElement('div');
    nh.className = 'nh ' + (med ? 'medeni' : 'mekki');

    const nhUst = document.createElement('div');
    nhUst.className = 'nh-ust';
    nhUst.innerHTML = `<div class="nh-n">${n.sira}</div><div class="nh-ar">${s.ar}</div><div class="nh-tr">${s.tr}</div>`;

    const nhAlt = document.createElement('div');
    nhAlt.className = 'nh-alt';
    nhAlt.innerHTML = `<div class="nh-ay">${n.ayetler}</div><div class="nih">${med ? kubbe() : kabe()}</div><span class="nh-alt-arrow">▼</span>`;

    nh.appendChild(nhUst);
    nh.appendChild(nhAlt);

    const nhSide = document.createElement('div'); nhSide.className = 'nh-side';
    const nhBot  = document.createElement('div'); nhBot.className  = 'nh-bot';
    nhWrap.appendChild(nh);
    nhWrap.appendChild(nhSide);
    nhWrap.appendChild(nhBot);

    // Sure kartı tık olayları (pan/tık ayrımı)
    let ustMdX = 0, ustMdY = 0, altMdX = 0, altMdY = 0;

    nhUst.addEventListener('mousedown', e => { ustMdX = e.clientX; ustMdY = e.clientY; });
    nhUst.addEventListener('click', e => {
      e.stopPropagation();
      if (Math.abs(e.clientX - ustMdX) > 5 || Math.abs(e.clientY - ustMdY) > 5) return;
      sutunOrtala(colX, Math.max(1, fersah - 2), 600);
    });

    nhAlt.addEventListener('mousedown', e => { altMdX = e.clientX; altMdY = e.clientY; });
    nhAlt.addEventListener('click', e => {
      e.stopPropagation();
      if (Math.abs(e.clientX - altMdX) > 5 || Math.abs(e.clientY - altMdY) > 5) return;
      ayetAc(col, colX);
    });

    col.appendChild(nhWrap);

    // Ayet kartları
    ayetler.forEach(ano => {
      const p = document.createElement('div');
      p.className = 'ap ' + (med ? 'md' : 'mk');
      p.dataset.sno  = sno;
      p.dataset.ano  = ano;
      p.dataset.sira = n.sira;
      p.dataset.colX = colX;

      const k = `${sno}:${ano}`;
      p.innerHTML = `<div class="ap-n">${ano}</div><div class="ap-ar">${AR_METINLER[k] || '·'}</div>`;

      let apMdX = 0, apMdY = 0, apSon = 0, apLong = null;

      p.addEventListener('mousedown', e => {
        apMdX = e.clientX; apMdY = e.clientY;
        // Long press
        apLong = setTimeout(() => {
          ctxGoster(e.clientX, e.clientY, { sno, ano, n });
          apLong = null;
        }, 600);
      });

      p.addEventListener('mouseup', () => { if (apLong) { clearTimeout(apLong); apLong = null; } });
      p.addEventListener('mouseleave', () => { if (apLong) { clearTimeout(apLong); apLong = null; } });

      p.addEventListener('contextmenu', e => {
        e.preventDefault();
        ctxGoster(e.clientX, e.clientY, { sno, ano, n });
      });

      p.addEventListener('click', e => {
        e.stopPropagation();
        if (Math.abs(e.clientX - apMdX) > 5 || Math.abs(e.clientY - apMdY) > 5) return;
        const now  = Date.now();
        const cift = now - apSon < 400;
        apSon = now;
        if (cift) {
          // Çift tık: zoom in
          sutunOrtala(colX, Math.max(1, fersah - 2), 400);
        } else {
          // Tek tık: modal aç
          modalAc(sno, ano, n);
        }
      });

      col.appendChild(p);
    });

    world.appendChild(col);
  });

  buildYearBand(N);
}

// MODAL
// ═══════════════════════════════════════════════════════
async function modalAc(sno, ano, n) {
  const s   = SURELER[sno] || { ar: '', tr: '' };
  const med = MEDENI.has(sno);
  const { nub, hicri, miladi } = tarihHesapla(n.sira);
  const k   = `${sno}:${ano}`;

  document.getElementById('modal-badge').innerHTML =
    `${med ? kubbe() : kabe()} <span>${s.tr} · ${ano}. Ayet · Nüzul ${n.sira}</span>`;
  document.getElementById('modal-dates').innerHTML =
    `<span class="mds-b mds-1">${nub}</span><span class="mds-b mds-2">${hicri}</span><span class="mds-b mds-3">${miladi}</span>`;
  document.getElementById('modal-ar').textContent = AR_METINLER[k] || `﴿ ${ano} ﴾`;
  document.getElementById('modal-meal').innerHTML =
    TR_MEAL[k]
      ? `<div style="font-size:13.5px;line-height:1.85">${TR_MEAL[k]}</div>`
      : '<div style="color:rgba(201,169,110,.3);font-size:11px">Yükleniyor...</div>';

  // Flip sırasında salınım durdur
  if (!modalFlipped) document.getElementById('modal-card').classList.remove('flipped');
  modalFlipped = false;
  modalAcik    = true;
  document.getElementById('modal-ov').classList.add('open');
  sesDur();

  // Meal çek
  if (!TR_MEAL[k]) {
    try {
      const r = await fetch(`https://api.alquran.cloud/v1/ayah/${sno}:${ano}/tr.diyanet`);
      const d = await r.json();
      if (d?.data?.text) {
        TR_MEAL[k] = d.data.text;
        document.getElementById('modal-meal').innerHTML =
          `<div style="font-size:13.5px;line-height:1.85">${d.data.text}</div>`;
      }
    } catch(e) {}
  }
}

function modalKapat() {
  document.getElementById('modal-ov').classList.remove('open');
  modalAcik    = false;
  modalFlipped = false;
  sesDur();
}

function modalFlip() {
  modalFlipped = !modalFlipped;
  document.getElementById('modal-card').classList.toggle('flipped', modalFlipped);
  if (modalFlipped) tefYukle();
}

document.getElementById('modal-ov').addEventListener('click', e => {
  if (e.target === document.getElementById('modal-ov')) modalKapat();
});

// TEFSİR
// ═══════════════════════════════════════════════════════
const TEF_SAYFA_BOY = 3000;

async function tefYukle() {
  if (!tefsirTam) {
    document.getElementById('tef-metin').innerHTML =
      '<div style="color:rgba(100,180,160,.5);text-align:center;padding:20px">Tefsir verisi henüz yüklenmedi.</div>';
    document.getElementById('tef-sayfa').style.display = 'none';
    return;
  }
  // Mevcut ayeti bul
  const badge = document.getElementById('modal-badge').textContent;
  // sno ve ano'yu badge'den değil, son açılan ayetten al
  // (modal açılırken saklayacağız)
  tefGoster();
}

let tefSno = null, tefAno = null;
async function modalAcTef(sno, ano, n) {
  tefSno = sno; tefAno = ano;
  await modalAc(sno, ano, n);
}

function tefGoster() {
  if (!tefsirTam || !tefSno || !tefAno) return;
  const re = new RegExp(
    `###SURE:${tefSno}###[\\s\\S]*?##AYET:${tefAno}(?:-\\d+)?##([\\s\\S]*?)(?=##AYET:|###SURE:|$)`
  );
  const m   = tefsirTam.match(re);
  const txt = m && m[1] ? m[1].trim() : 'Bu ayet için tefsir verisi bulunamadı.';

  // Sayfalara böl
  const paras = txt.split('\n\n');
  tefParcalar = [];
  let p = '';
  paras.forEach(par => {
    const d = p ? p + '\n\n' + par : par;
    if (d.length > TEF_SAYFA_BOY && p) { tefParcalar.push(p); p = par; }
    else p = d;
  });
  if (p) tefParcalar.push(p);
  if (!tefParcalar.length) tefParcalar = ['Tefsir bulunamadı.'];
  tefIdx = 0;
  tefRender();
}

function tefRender() {
  document.getElementById('tef-metin').textContent = tefParcalar[tefIdx] || '';
  document.getElementById('tef-metin').scrollTop   = 0;
  document.getElementById('tef-inf').textContent   = `${tefIdx + 1} / ${tefParcalar.length}`;
  document.getElementById('tef-geri').disabled     = tefIdx === 0;
  document.getElementById('tef-ileri').disabled    = tefIdx === tefParcalar.length - 1;
  document.getElementById('tef-sayfa').style.display = tefParcalar.length <= 1 ? 'none' : 'flex';
}

function tefSayfa(d) {
  tefIdx = Math.max(0, Math.min(tefParcalar.length - 1, tefIdx + d));
  tefRender();
}

async function tefsirIndir() {
  try {
    const [r1, r2] = await Promise.all([fetch(PART1_URL), fetch(PART2_URL)]);
    const [t1, t2] = await Promise.all([r1.text(), r2.text()]);
    tefsirTam = t1 + t2;
    console.log('Tefsir yüklendi:', Math.round(tefsirTam.length / 1024 / 1024 * 10) / 10, 'MB');
  } catch(e) { console.warn('Tefsir yüklenemedi:', e.message); }
}

// ═══════════════════════════════════════════════════════
function sesTog() { sesDurum.calisiyor ? sesDur() : sesCal(); }

function sesCal() {
  // sno ve ano'yu modal'dan al
  const badge = document.getElementById('modal-badge');
  if (!badge) return;
  // tefSno/tefAno kullan
  if (!tefSno || !tefAno) return;
  const absNo = sesAbsNo(tefSno, tefAno);
  const url   = `https://cdn.islamic.network/quran/audio/128/ar.alafasy/${absNo}.mp3`;
  const a     = new Audio(url);
  sesDurum    = { calisiyor: true, audio: a };
  const btn   = document.getElementById('btn-ses');
  if (btn) { btn.textContent = '⏹ Dur'; btn.classList.add('calisiyor'); }
  a.play().catch(() => {});
  a.ontimeupdate = () => {
    if (a.duration) document.getElementById('ses-dolu').style.width =
      (a.currentTime / a.duration * 100) + '%';
  };
  a.onended = () => sesDur();
}

function sesDur() {
  if (sesDurum.audio) try { sesDurum.audio.pause(); } catch(e) {}
  sesDurum = { calisiyor: false, audio: null };
  const btn = document.getElementById('btn-ses');
  if (btn) { btn.textContent = '▶ Dinle'; btn.classList.remove('calisiyor'); }
  const dolu = document.getElementById('ses-dolu');
  if (dolu) dolu.style.width = '0%';
}

function siraDegis(sira) {
  if (sira === aktifSira) return;
  aktifSira = sira;
  document.getElementById('btn-nuzul').classList.toggle('aktif', sira === 'nuzul');
  document.getElementById('btn-mushaf').classList.toggle('aktif', sira === 'mushaf');
  document.getElementById('year-band').style.display = sira === 'nuzul' ? 'flex' : 'none';

  const world = document.getElementById('world');
  const cols  = Array.from(world.querySelectorAll('.nc'));
  const N     = cols.length;

  if (sira === 'nuzul') {
    cols.sort((a, b) => parseInt(a.dataset.nuzulIdx) - parseInt(b.dataset.nuzulIdx));
  } else {
    cols.sort((a, b) => {
      const sa = parseInt(a.dataset.sno), sb = parseInt(b.dataset.sno);
      if (sa !== sb) return sa - sb;
      return parseInt(a.dataset.ayetBas || 0) - parseInt(b.dataset.ayetBas || 0);
    });
  }

  cols.forEach((col, idx) => {
    const newX = (N - 1 - idx) * COL_W;
    col.style.transition = 'left 2s cubic-bezier(.4,0,.2,1)';
    col.style.left = newX + 'px';
    col.dataset.colX = newX;
  });
  setTimeout(() => cols.forEach(c => c.style.transition = ''), 2100);
}

  const btn  = document.getElementById(tip + '-dd-btn');
  const list = document.getElementById(tip + '-dd-list');
  const acik = list.classList.contains('open');
  // Tüm dropdown'ları kapat
  document.querySelectorAll('.dd-list').forEach(l => l.classList.remove('open'));
  document.querySelectorAll('.dd-btn').forEach(b => b.classList.remove('open'));
  if (!acik) { list.classList.add('open'); btn.classList.add('open'); }
}

function sureMenusiDoldur() {
  const list = document.getElementById('sure-dd-list');
  list.innerHTML = '';
  // Alfabetik sıraya göre
  const sureler = Object.entries(SURELER).sort((a, b) => a[1].tr.localeCompare(b[1].tr, 'tr'));
  sureler.forEach(([sno, s]) => {
    const item = document.createElement('div');
    item.className = 'dd-item';

      ddToggle('ayet');
      // O sureye git
      const N = NUZUL.length;
      const idx = NUZUL.findIndex(n => n.sure_no === parseInt(sno));
      if (idx >= 0) {
        const colX = (N - 1 - idx) * COL_W;
        sutunOrtala(colX, Math.min(fersah, 7), 600);
      }
    };
    list.appendChild(item);
  });
}

function ayetMenusiDoldur(sno) {
  const list = document.getElementById('ayet-dd-list');
  list.innerHTML = '';
  if (!sno) return;
  // O sureye ait nüzul kayıtları
  const kayitlar = NUZUL.filter(n => n.sure_no === sno);
  kayitlar.forEach(n => {
    const ayetler = (n.ayetler_liste && n.ayetler_liste.length > 0)
      ? n.ayetler_liste : ayetDizi(n.ayetler);
    ayetler.forEach(ano => {
      const item = document.createElement('div');
      item.className = 'dd-item';
      item.textContent = `${ano}. Ayet`;
      item.onclick = () => {
        ddToggle('');  // kapat
        const N   = NUZUL.length;
        const idx = NUZUL.indexOf(n);
        const colX = (N - 1 - idx) * COL_W;
        // Animasyon: önce sütuna git, ayet kartlarını aç, sonra ayete git
        sutunOrtala(colX, 5, 600);
        setTimeout(() => {
          const col = document.querySelector(`.nc[data-nuzul-idx="${idx}"]`);
          if (col) {
            ayetAc(col, colX);
            setTimeout(() => {
              // Ayet kartına git
              const ap = col.querySelector(`[data-ano="${ano}"]`);
              if (ap) {
                const { w, h } = vpBoyut();
                const rect = ap.getBoundingClientRect();
                const worldY = (rect.top - TOPBAR_H) / scale - ty / scale;
                animTo(tx, h / 2 - worldY * scale, scale, 400);
              }
            }, 800);
          }
          modalAc(sno, ano, n);
        }, 700);
      };
      list.appendChild(item);
    });
  });
}

// ═══════════════════════════════════════════════════════
// ARAMA
// ═══════════════════════════════════════════════════════
function initArama() {
  const inp = document.getElementById('srch');
  const res = document.getElementById('srch-results');

  inp.addEventListener('input', () => {
    clearTimeout(srTimer);
    const q = inp.value.trim();
    if (!q) { res.classList.remove('open'); return; }
    res.innerHTML = '<div class="sr-empty">Aranıyor...</div>';
    res.classList.add('open');
    srTimer = setTimeout(() => doSearch(q), 350);
  });

  inp.addEventListener('keydown', e => {
    if (e.key === 'Escape') { res.classList.remove('open'); inp.blur(); }
  });

  document.addEventListener('click', e => {
    if (!document.getElementById('srch-wrap').contains(e.target))
      res.classList.remove('open');
  });
}

function doSearch(q) {
  const res = document.getElementById('srch-results');
  const ql  = q.toLowerCase();
  const hits = [];

  NUZUL.forEach(n => {
    const sno     = n.sure_no;
    const s       = SURELER[sno] || { ar: '', tr: '' };
    const ayetler = (n.ayetler_liste && n.ayetler_liste.length > 0)
      ? n.ayetler_liste : ayetDizi(n.ayetler);

    if (s.tr.toLowerCase().includes(ql) || s.ar.includes(q)) {
      hits.push({ sno, ano: ayetler[0] || 1, n, meta: `${s.tr} · Nüzul ${n.sira}`, text: n.ayetler });
    }
    ayetler.forEach(ano => {
      const k    = `${sno}:${ano}`;
      const meal = TR_MEAL[k] || '';
      const ar   = AR_METINLER[k] || '';
      if (meal.toLowerCase().includes(ql) || ar.includes(q)) {
        const safe = q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
        const hi   = meal.replace(new RegExp(`(${safe})`, 'gi'), '<span class="sr-hl">$1</span>');
        hits.push({ sno, ano, n, meta: `${s.tr} · ${ano}. Ayet`, text: hi || ar });
      }
    });
  });

  if (!hits.length) { res.innerHTML = '<div class="sr-empty">Sonuç bulunamadı.</div>'; return; }

  res.innerHTML = hits.slice(0, 10).map(h =>
    `<div class="sr-item" onclick="srGit(${h.sno},${h.ano},${h.n.sira})">
      <div class="sr-meta">${h.meta}</div>
      <div class="sr-text">${h.text}</div>
    </div>`
  ).join('');
  res.classList.add('open');
}

function srGit(sno, ano, sira) {
  const N   = NUZUL.length;
  const idx = NUZUL.findIndex(x => x.sira === sira);
  if (idx >= 0) {
    const colX = (N - 1 - idx) * COL_W;
    const n    = NUZUL[idx];
    sutunOrtala(colX, 5, 600);
    setTimeout(() => {
      const col = document.querySelector(`.nc[data-nuzul-idx="${idx}"]`);
      if (col) ayetAc(col, colX);
      modalAc(sno, ano, n);
    }, 700);
  }
  document.getElementById('srch-results').classList.remove('open');
  document.getElementById('srch').value = '';
}

// ═══════════════════════════════════════════════════════
// KLAVYE
// ═══════════════════════════════════════════════════════
function initKlavye() {
  document.addEventListener('keydown', e => {
    if (e.target.tagName === 'INPUT') return;
    const { w, h } = vpBoyut();
    const adim = 80;

    switch (e.key) {
      case 'ArrowLeft':  tx += adim; applyT(); e.preventDefault(); break;
      case 'ArrowRight': tx -= adim; applyT(); e.preventDefault(); break;
      case 'ArrowUp':    ty += adim; applyT(); e.preventDefault(); break;
      case 'ArrowDown':  ty -= adim; applyT(); e.preventDefault(); break;
      case '+': case '=': zoomPivot(fersah - 1, w/2, h/2, 300); e.preventDefault(); break;
      case '-': case '_': zoomPivot(fersah + 1, w/2, h/2, 300); e.preventDefault(); break;
      case 'Home': {
        const N = NUZUL.length;
        if (N) sutunOrtala((N-1) * COL_W, fersah, 500);
        e.preventDefault(); break;
      }
      case 'End': {
        sutunOrtala(0, fersah, 500);
        e.preventDefault(); break;
      }
      case 'Escape':
        if (modalAcik) modalKapat();
        ctxKapat();
        e.preventDefault(); break;
    }
  });
}

// ═══════════════════════════════════════════════════════
// PAN & SCROLL
// ═══════════════════════════════════════════════════════
function initInteraksiyon() {
  const vp = document.getElementById('vp');
  let panAktif = false, panX = 0, panY = 0;
  let lastScroll = 0;

  vp.addEventListener('mousedown', e => {
    if (e.target.closest('#modal-ov') || e.target.closest('#ctx-menu')) return;
    panAktif = true; panX = e.clientX; panY = e.clientY;
    vp.style.cursor = 'grabbing';
    document.body.style.userSelect = 'none';
    document.body.style.webkitUserSelect = 'none';
  });

  window.addEventListener('mouseup', () => {
    panAktif = false;
    document.getElementById('vp').style.cursor = 'grab';
    document.body.style.userSelect = '';
    document.body.style.webkitUserSelect = '';
  });

  window.addEventListener('mousemove', e => {
    if (!panAktif) return;
    tx += e.clientX - panX;
    ty += e.clientY - panY;
    panX = e.clientX; panY = e.clientY;
    applyT();
  });

  vp.addEventListener('wheel', e => {
    e.preventDefault();
    const rect = vp.getBoundingClientRect();
    const px   = e.clientX - rect.left;
    const py   = e.clientY - rect.top;

    if (Math.abs(e.deltaX) > Math.abs(e.deltaY) * 1.2) {
      tx -= e.deltaX * 1.2; applyT(); return;
    }
    const now = Date.now();
    if (now - lastScroll < 120) return;
    lastScroll = now;
    zoomPivot(e.deltaY > 0 ? fersah + 1 : fersah - 1, px, py, 280);
  }, { passive: false });

  // Touch
  let lTx = 0, lTy = 0, lPinch = 0;
  vp.addEventListener('touchstart', e => {
    if (e.touches.length === 1) { lTx = e.touches[0].clientX; lTy = e.touches[0].clientY; }
    if (e.touches.length === 2) lPinch = Math.hypot(
      e.touches[0].clientX - e.touches[1].clientX,
      e.touches[0].clientY - e.touches[1].clientY
    );
  }, { passive: true });

  vp.addEventListener('touchmove', e => {
    e.preventDefault();
    if (e.touches.length === 1) {
      tx += e.touches[0].clientX - lTx;
      ty += e.touches[0].clientY - lTy;
      lTx = e.touches[0].clientX; lTy = e.touches[0].clientY;
      applyT();
    }
    if (e.touches.length === 2) {
      const d  = Math.hypot(
        e.touches[0].clientX - e.touches[1].clientX,
        e.touches[0].clientY - e.touches[1].clientY
      );
      const cx = (e.touches[0].clientX + e.touches[1].clientX) / 2;
      const cy = (e.touches[0].clientY + e.touches[1].clientY) / 2;
      const rect = vp.getBoundingClientRect();
      zoomPivot(d < lPinch ? fersah + 1 : fersah - 1, cx - rect.left, cy - rect.top, 200);
      lPinch = d;
    }
  }, { passive: false });
}

// ═══════════════════════════════════════════════════════
// YILDIZLAR
// ═══════════════════════════════════════════════════════
function initYildizlar() {
  const cv  = document.getElementById('stars');
  const rsz = () => { cv.width = window.innerWidth; cv.height = window.innerHeight; };
  rsz(); window.addEventListener('resize', rsz);
  const ctx = cv.getContext('2d');
  const S   = Array.from({ length: 280 }, () => ({
    x: Math.random() * cv.width, y: Math.random() * cv.height,
    r: Math.random() * 1.1 + .2, a: Math.random(),
    s: Math.random() * .007 + .002, d: Math.random() > .5 ? 1 : -1
  }));
  const B   = Array.from({ length: 8 }, () => ({
    x: Math.random() * cv.width, y: Math.random() * cv.height,
    r: Math.random() * 1.6 + .7, t: Math.random() * 6.28,
    sp: Math.random() * .018 + .006
  }));
  function draw() {
    ctx.clearRect(0, 0, cv.width, cv.height);
    S.forEach(s => {
      s.a += s.s * s.d;
      if (s.a > 1 || s.a < .08) s.d *= -1;
      ctx.beginPath(); ctx.arc(s.x, s.y, s.r, 0, 6.28);
      ctx.fillStyle = `rgba(255,255,240,${s.a * .6})`; ctx.fill();
    });
    B.forEach(b => {
      b.t += b.sp;
      const p = Math.sin(b.t) * .5 + .5;
      ctx.beginPath(); ctx.arc(b.x, b.y, b.r * (.3 + p * .7), 0, 6.28);
      ctx.fillStyle = `rgba(201,169,110,${p * .65})`; ctx.fill();
    });
    requestAnimationFrame(draw);
  }
  draw();
}

// ═══════════════════════════════════════════════════════
// SALINM ANİMASYONU (3D)
// ═══════════════════════════════════════════════════════
function initSalinim() {
  const dur = 7000;
  function tick() {
    if (modalAcik) { requestAnimationFrame(tick); return; } // modal açıkken dur
    const angle = Math.sin((performance.now() % dur) / dur * Math.PI * 2) * 15;
    document.querySelectorAll('.nh-wrap').forEach(w => {
      w.style.transform = `rotateY(${angle}deg)`;
    });
    document.querySelectorAll('.ap').forEach((p, i) => {
      const offset = (i % 5) / 5 * Math.PI * 0.3;
      const a = Math.sin((performance.now() % dur) / dur * Math.PI * 2 + offset) * 15;
      p.style.transform = `rotateY(${a}deg)`;
    });
    requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);
}

// ═══════════════════════════════════════════════════════
// GİRİŞ ANİMASYONU
// ═══════════════════════════════════════════════════════
function girisAnimasyonu() {
  // localStorage'dan ilk ziyaret kontrolü
  const ilkZiyaret = !localStorage.getItem('kuran_ziyaret');
  const N = NUZUL.length;
  if (!N) return;

  const { w, h } = vpBoyut();
  fitScale = (w * 0.94) / (N * COL_W);

  if (ilkZiyaret) {
    localStorage.setItem('kuran_ziyaret', '1');
    // 1. Önce tümünü göster
    fersah = FERSAH_N;
    scale  = fitScale;
    tx     = (w - N * COL_W * fitScale) / 2;
    ty     = h * 0.1;
    applyT();
    // 2. 2 saniye sonra Fatiha'ya yaklaş (5. fersah)
    setTimeout(() => {
      const fatihaCX = (N - 1) * COL_W + COL_W / 2;
      const hScale   = fersahToScale(5);
      fersah = 5;
      animTo(w / 2 - fatihaCX * hScale, h * 0.15, hScale, 1200);
    }, 2000);
  } else {
    // Sonraki ziyaretlerde direkt Fatiha
    const fatihaCX = (N - 1) * COL_W + COL_W / 2;
    const hScale   = fersahToScale(5);
    fersah = 5;
    scale  = hScale;
    tx     = w / 2 - fatihaCX * hScale;
    ty     = h * 0.15;
    applyT();
  }
}
